<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Aboubowling</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body{background:#081028;color:#fff;font-family:Segoe UI,Roboto,Arial;margin:0;padding:18px}
    main{max-width:980px;margin:8px auto;text-align:center}
    h1{margin:8px 0 12px;font-size:2.4rem}
    #status{min-height:36px;margin-bottom:12px;font-weight:900;font-size:1.2rem}
    .player-order{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:8px 0}
    .player-chip{padding:10px 12px;border-radius:12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);font-weight:800}

    /* selector area */
    #selector{display:none;margin-top:14px}
    .reel-grid{display:flex;gap:18px;justify-content:center;align-items:flex-start}
    .reel-card{width:200px;height:220px;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.04);border-radius:10px;padding:10px;display:flex;flex-direction:column;align-items:center;position:relative;overflow:hidden}
    .reel-title{font-weight:900;margin-bottom:8px}
    .reel-display{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .reel-display img{width:88px;height:88px;object-fit:contain}
    .reel-label{margin-top:8px;font-weight:700}
    .rarity-badge{position:absolute;left:8px;top:8px;padding:4px 8px;border-radius:999px;font-weight:800;font-size:0.75rem}
    .rarity-pas{background:rgba(255,80,80,0.12);color:#ff9aa6;border:1px solid rgba(255,80,80,0.18)}
    .rarity-okay{background:rgba(200,200,200,0.06);color:#ddd;border:1px solid rgba(255,255,255,0.04)}
    .rarity-bien{background:rgba(72,201,116,0.12);color:#9fffb0;border:1px solid rgba(72,201,116,0.18)}

    .controls-row{display:flex;gap:12px;justify-content:center;margin-top:12px}
    .btn{padding:10px 14px;border-radius:10px;background:#6bc0ff;color:#072035;border:none;font-weight:800;cursor:pointer}
    .btn.red{background:#ff4b4b;color:#fff}

    /* timer */
    .turn-timer{width:420px;height:10px;background:rgba(255,255,255,0.06);border-radius:999px;overflow:hidden;margin:8px auto}
    .turn-timer .fill{height:100%;background:linear-gradient(90deg,#ffd7a6,#ff9aa6);width:100%;transition:width linear}
    .timer-row{display:flex;align-items:center;gap:10px;margin-top:6px;justify-content:center}

    /* reroll flash and float (more subtle) */
    .flash{position:absolute;inset:0;background:rgba(255,0,0,0.06);pointer-events:none;opacity:0;transition:opacity .18s}
    .flash.show{opacity:1}
    .float-minus{position:absolute;right:14px;bottom:58px;background:transparent;color:#ff4b4b;padding:0;font-weight:900;pointer-events:none;opacity:0;transform:translateY(0);transition:transform .8s ease,opacity .8s}
    .float-minus.show{opacity:1;transform:translateY(-40px);}

    /* reel strip animation layout */
    .reel-display{overflow:hidden;height:180px;width:100%;display:flex;align-items:center;justify-content:center;position:relative}
    .reel-strip{display:flex;flex-direction:column;align-items:center}
    .reel-item{height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .reel-item img{width:120px;height:120px;object-fit:contain;border-radius:8px}
    .reel-label.final{position:absolute;left:50%;transform:translateX(-50%);bottom:10px;font-weight:900;background:rgba(0,0,0,0.18);padding:6px 10px;border-radius:8px}

    /* hide controls while reels spin */
    .controls-row{display:none;gap:12px;justify-content:center;margin-top:12px}

    /* tighten timer label next to timer */
    .timer-row{display:flex;align-items:center;gap:6px;margin-top:6px;justify-content:center}

    /* reroll overlay */
    .reroll-overlay{position:fixed;inset:0;background:rgba(255,0,0,0.06);pointer-events:none;opacity:0;transition:opacity .18s;z-index:10000}
    .reroll-overlay.show{opacity:1}

    /* bowling lane styles */
    .lane-area{display:none;margin-top:18px}
    .chosen-squares{display:flex;gap:8px;justify-content:center;margin-bottom:10px}
    .chosen-square{width:52px;height:52px;border-radius:8px;background:rgba(255,255,255,0.02);display:flex;align-items:center;justify-content:center;flex-direction:column;border:1px solid rgba(255,255,255,0.04);font-weight:800;font-size:0.7rem}
    .lane-row{display:flex;gap:12px;justify-content:center;align-items:flex-start}
    .position-column{width:64px;display:flex;flex-direction:column;gap:10px;align-items:center}
    .pos-dot{width:34px;height:34px;border-radius:50%;border:2px dashed rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;cursor:pointer}
    .pos-dot.active{background:rgba(255,255,255,0.04);border-style:solid}
    .lane-canvas{border-radius:8px;background:linear-gradient(180deg,#0b2540,#02203a);box-shadow:inset 0 0 18px rgba(0,0,0,0.45);border:1px solid rgba(255,255,255,0.03)}
    .lane-controls{display:flex;gap:12px;justify-content:center;margin-top:10px;align-items:center}
    .overlay-score{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:10001;opacity:0;pointer-events:none;transition:opacity .18s}
    .overlay-score.show{opacity:1;pointer-events:auto}
    .score-card{background:#072035;padding:18px 28px;border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,0.6);color:#ffd7a6;font-weight:900;font-size:2.2rem;text-align:center}
    .return-btn{margin-top:12px;padding:10px 14px;border-radius:10px;background:#ff776d;color:#fff;border:none;font-weight:700;cursor:pointer;border:1px solid rgba(0,0,0,0.08);box-shadow:0 8px 20px rgba(0,0,0,0.32)}

    /* responsive */
    @media(max-width:720px){ .reel-grid{flex-direction:column;align-items:center} }
  </style>
</head>
<body>
  <main>
    <h1>Aboubowling</h1>
    <div id="status">Chargement des joueurs...</div>
    <div id="order" class="player-order"></div>

    <div id="selector">
      <div class="reel-grid">
        <div class="reel-card" id="card-boule">
          <div class="rarity-badge" id="badge-boule"></div>
          <div class="reel-title">Boule</div>
          <div class="reel-display"><img id="img-boule" src="" alt=""/><div class="reel-label" id="label-boule"></div></div>
          <div class="flash" id="flash-boule"></div>
        </div>

        <div class="reel-card" id="card-tir">
          <div class="rarity-badge" id="badge-tir"></div>
          <div class="reel-title">Tir</div>
          <div class="reel-display"><img id="img-tir" src="" alt=""/><div class="reel-label" id="label-tir"></div></div>
          <div class="flash" id="flash-tir"></div>
        </div>

        <div class="reel-card" id="card-puissance">
          <div class="rarity-badge" id="badge-puissance"></div>
          <div class="reel-title">Puissance</div>
          <div class="reel-display"><img id="img-puissance" src="" alt=""/><div class="reel-label" id="label-puissance"></div></div>
          <div class="flash" id="flash-puissance"></div>
        </div>
      </div>

      <div class="controls-row">
        <button id="validateBtn" class="btn">Valider</button>
        <div style="position:relative">
          <button id="rerollBtn" class="btn red">Relancer (-1 quille)</button>
          <div class="float-minus" id="floatMinus">-1 quille</div>
        </div>
      </div>

      <div id="turnTimer" style="display:none;max-width:720px;margin:6px auto 0;justify-content:center;align-items:center">
        <div class="timer-row">
          <div class="turn-timer" style="width:320px"><div id="timerFill" class="fill"></div></div>
          <div id="timerLabel" style="min-width:52px;font-weight:900;color:#ffd7a6;margin-left:-6px">15.0s</div>
        </div>
      </div>
    </div>

    <div style="width:100%;max-width:920px;margin-top:8px">
      <script src="game-players.js"></script>
    </div>

    <!-- Bowling lane area (hidden until selections finished) -->
    <div id="laneArea" class="lane-area">
      <div id="chosenDisplay" class="chosen-squares"></div>
      <div class="lane-row">
        <div id="positionColumn" class="position-column"></div>
        <div style="width:820px;max-width:82vw">
          <canvas id="laneCanvas" class="lane-canvas" width="820" height="240"></canvas>
        </div>
        <div style="width:64px;display:flex;align-items:center;justify-content:center">
          <!-- pins column placeholder (visual pins are drawn on canvas) -->
        </div>
      </div>
      <div class="lane-controls">
        <div id="laneTimer" style="display:none;max-width:240px">
          <div class="timer-row" style="justify-content:flex-start;align-items:center;gap:8px">
            <div class="turn-timer" style="width:170px"><div id="laneTimerFill" class="fill"></div></div>
            <div id="laneTimerLabel" style="min-width:48px;font-weight:900;color:#ffd7a6;margin-left:6px">10.0s</div>
          </div>
        </div>
        <button id="changeDirBtn" class="btn">Changer le sens</button>
        <button id="shootBtn" class="btn red">TIRER</button>
      </div>
    </div>
  </main>

  <script>
  (function(){
    const stored = JSON.parse(localStorage.getItem('mini-Jeux-host-players') || '[]');
    const statusEl = document.getElementById('status');
    const orderEl = document.getElementById('order');
    orderEl.style.display = 'none';

    if (!stored.length){ statusEl.textContent = 'Aucun joueur enregistré.'; return; }

    // build players and order
    let players = stored.map(p=>({ name: p.name, color: p.color || '#8ac6ff', score: 0, choice: null }));
    function shuffle(a){ return a.slice().sort(()=>Math.random()-0.5); }
    let order = shuffle(players.slice());
    let currentIdx = -1;
    // remember last pattern index to avoid repeating the same pattern twice
    let lastPatternIndex = -1;

    function renderOrder(){ orderEl.innerHTML = ''; orderEl.style.display = 'flex'; order.forEach(p=>{ const chip = document.createElement('div'); chip.className='player-chip'; chip.dataset.player = p.name; chip.style.borderColor = p.color; chip.textContent = p.name; orderEl.appendChild(chip); }); }

    function showStatus(html, transientMs){ statusEl.innerHTML = html; if (transientMs){ clearTimeout(statusEl._timer); statusEl._timer = setTimeout(()=> { statusEl.innerHTML = html; }, transientMs); } }

    function announceOrder(){ let step=0; const preview = setInterval(()=>{ statusEl.textContent = 'Ordre aléatoire... ' + stored[Math.floor(Math.random()*stored.length)].name; step++; if (step>18){ clearInterval(preview); renderOrder(); setTimeout(()=> startSelection(0), 700); } }, 80); }

    // slot options
    const options = {
      boule: [
        { id:'tennis', label:'Balle de tennis', rarity:'pas', img:'assets/game-11/tennis.png' },
        { id:'boule', label:'Boule', rarity:'okay', img:'assets/game-11/boule.png' },
        { id:'pasteque', label:'Pastèque', rarity:'bien', img:'assets/game-11/pasteque.png' }
      ],
      tir: [
        { id:'zigzag', label:'Zigzag', rarity:'pas', img:'assets/game-11/zigzag.png' },
        { id:'effet', label:'Effet', rarity:'okay', img:'assets/game-11/effet.png' },
        { id:'droit', label:'Droit', rarity:'bien', img:'assets/game-11/droit.png' }
      ],
      puissance: [
        { id:'faible', label:'Faible', rarity:'pas', img:'assets/game-11/faible.png' },
        { id:'normal', label:'Normal', rarity:'okay', img:'assets/game-11/normal.png' },
        { id:'fort', label:'Fort', rarity:'bien', img:'assets/game-11/fort.png' }
      ]
    };

    // preload images and cache
    const imageCache = {};
    function loadImage(src){ if (!src) return null; if (imageCache[src]) return imageCache[src]; const im = new Image(); im.src = src; imageCache[src] = im; return im; }
    // preload common assets (load normal + red pin variants)
    const quilleImg = loadImage('assets/game-11/quille.png');
    const quilleRedImg = loadImage('assets/game-11/quille-rouge.png');
    options.boule.forEach(b => loadImage(b.img));
    options.tir.forEach(t => loadImage(t.img));
    options.puissance.forEach(p => loadImage(p.img));

    const cardB = document.getElementById('card-boule');
    const cardT = document.getElementById('card-tir');
    const cardP = document.getElementById('card-puissance');
    const imgB = document.getElementById('img-boule'); const imgT = document.getElementById('img-tir'); const imgP = document.getElementById('img-puissance');
    const labelB = document.getElementById('label-boule'); const labelT = document.getElementById('label-tir'); const labelP = document.getElementById('label-puissance');
    const badgeB = document.getElementById('badge-boule'); const badgeT = document.getElementById('badge-tir'); const badgeP = document.getElementById('badge-puissance');
    const flashB = document.getElementById('flash-boule'); const flashT = document.getElementById('flash-tir'); const flashP = document.getElementById('flash-puissance');

    const selector = document.getElementById('selector');
    const validateBtn = document.getElementById('validateBtn');
    const rerollBtn = document.getElementById('rerollBtn');
    const floatMinus = document.getElementById('floatMinus');

    const timerEl = document.getElementById('turnTimer');
    const timerFill = document.getElementById('timerFill');
    const timerLabel = document.getElementById('timerLabel');
    let timerDuration = 15; let timerInterval = null; let timerStart = 0;

    function startTimer(){ stopTimer(); timerFill.style.transition = 'none'; timerFill.style.width = '100%'; void timerFill.offsetWidth; timerStart = Date.now(); timerFill.style.transition = `width ${timerDuration}s linear`; requestAnimationFrame(()=> timerFill.style.width = '0%'); timerLabel.textContent = `${timerDuration.toFixed(1)}s`; timerInterval = setInterval(()=>{ const rem = Math.max(0, timerDuration - ((Date.now()-timerStart)/1000)); timerLabel.textContent = rem.toFixed(1) + 's'; if (rem <= 0){ stopTimer(); statusEl.innerHTML = '<strong style="color:#ffb86b">Temps écoulé — validé automatiquement</strong>'; validateCurrent(); } }, 100); }
    function stopTimer(){ if (timerInterval){ clearInterval(timerInterval); timerInterval = null; } timerFill.style.transition = 'none'; timerFill.style.width = '100%'; timerLabel.textContent = ''; }

    // choose allowed patterns of rarities (avoid same pattern twice)
    function choosePattern(){
      const patterns = [
        ['pas','okay','bien'],
        ['bien','bien','pas'],
        ['pas','pas','bien'],
        ['okay','okay','okay']
      ];
      if (!patterns.length) return [];
      // pick a random index, but avoid repeating the last one
      let idx = Math.floor(Math.random()*patterns.length);
      if (lastPatternIndex >= 0 && patterns.length > 1){
        let tries = 0;
        while (idx === lastPatternIndex && tries < 8){
          idx = Math.floor(Math.random()*patterns.length);
          tries++;
        }
        if (idx === lastPatternIndex){
          idx = (lastPatternIndex + 1) % patterns.length;
        }
      }
      lastPatternIndex = idx;
      return patterns[idx].slice();
    }

    const controlsRow = document.querySelector('.controls-row');

    function animateSlot(cardEl, imageEl, labelEl, badgeEl, flashEl, choices, forcedRarity){
      return new Promise((resolve)=>{
        const display = cardEl.querySelector('.reel-display');
        display.innerHTML = '';
        // reset card background to neutral while spinning
        cardEl.style.background = 'linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01))';
        const strip = document.createElement('div'); strip.className = 'reel-strip';
        const repeats = 20; // more repeats to ensure no empty gap
        for (let r = 0; r < repeats; r++){
          for (let k = 0; k < choices.length; k++){
            const it = document.createElement('div'); it.className = 'reel-item';
            const im = document.createElement('img'); im.src = choices[k].img; im.alt = choices[k].label; im.style.width='120px'; im.style.height='120px';
            // during spin we don't show text to keep visuals clean
            it.appendChild(im); strip.appendChild(it);
          }
        }
        display.appendChild(strip);
        // force layout so item sizes are measurable before computing final translate
        void strip.offsetHeight;

        // choose final item respecting forcedRarity when possible
        const candidates = choices.filter(c => c.rarity === forcedRarity);
        const finalChoice = (candidates.length ? candidates[Math.floor(Math.random()*candidates.length)] : choices[Math.floor(Math.random()*choices.length)]);
        const indexInChoices = choices.findIndex(c => c.id === finalChoice.id);
        const cycles = 3 + Math.floor(Math.random()*3); // 3..5 cycles

        // compute finalIndex but ensure it aligns with the chosen item's modulo and stays within the strip length
        const totalItems = strip.children.length;
        const rawFinalIndex = cycles * choices.length + indexInChoices;
        const maxIndex = totalItems - 1;
        const maxCandidateIndex = indexInChoices + Math.floor((maxIndex - indexInChoices)/choices.length) * choices.length;
        let finalIndex = Math.min(rawFinalIndex, maxCandidateIndex);

        // compute sizes dynamically so we land perfectly centered
        const firstItem = strip.querySelector('.reel-item');
        const itemHeight = firstItem ? firstItem.offsetHeight : 180;
        // Because the strip is centered inside the display (flex align), the
        // transform must bring the chosen item's center to the display center.
        // Derivation: translateY = itemHeight * ((totalItems - 1)/2 - finalIndex)
        const finalTranslate = Math.round(itemHeight * ((totalItems - 1) / 2 - finalIndex));

        const duration = 900 + Math.floor(Math.random()*700);
        // ensure initial transform and hint to the browser, force layout
        strip.style.transform = 'translateY(0px)';
        strip.style.willChange = 'transform';
        void strip.offsetHeight;
        // start transform with explicit transition and listen for its end
        strip.style.transition = `transform ${duration}ms cubic-bezier(.2,.85,.2,1)`;
        function onEnd(e){
          if (e && e.propertyName && e.propertyName !== 'transform') return;
          strip.removeEventListener('transitionend', onEnd);
          // set final static view
          display.innerHTML = '';
          // color the card slightly based on rarity
          if (finalChoice.rarity === 'pas') cardEl.style.background = 'linear-gradient(180deg, rgba(255,80,80,0.06), rgba(255,80,80,0.02))';
          else if (finalChoice.rarity === 'okay') cardEl.style.background = 'linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01))';
          else cardEl.style.background = 'linear-gradient(180deg, rgba(72,201,116,0.06), rgba(72,201,116,0.02))';
          const finalImg = document.createElement('img'); finalImg.src = finalChoice.img; finalImg.style.width='120px'; finalImg.style.height='120px'; finalImg.style.borderRadius='8px';
          display.appendChild(finalImg);
          // overlay label
          const finalLab = document.createElement('div'); finalLab.className = 'reel-label final'; finalLab.textContent = finalChoice.label; display.appendChild(finalLab);
          badgeEl.textContent = finalChoice.rarity === 'pas' ? 'Pas ouf' : finalChoice.rarity === 'okay' ? 'Okay' : 'Bien';
          badgeEl.className = 'rarity-badge ' + (finalChoice.rarity === 'pas' ? 'rarity-pas' : finalChoice.rarity === 'okay' ? 'rarity-okay' : 'rarity-bien');
          // brief flash
          flashEl.classList.add('show'); setTimeout(()=> flashEl.classList.remove('show'), 160);
          resolve(finalChoice);
        }
        strip.addEventListener('transitionend', onEnd);
        // trigger the transform on next frame
        requestAnimationFrame(()=> { strip.style.transform = `translateY(${finalTranslate}px)`; });
      });
    }

    let currentResults = { boule:null, tir:null, puissance:null };

    async function playAllSlots(){
      // hide controls and timer while reels spin
      if (controlsRow) controlsRow.style.display = 'none';
      timerEl.style.display = 'none';

      // choose a pattern of rarities and shuffle assignment to reels
      const patt = choosePattern();
      const rarities = shuffle(patt.slice());

      const p1 = animateSlot(cardB, imgB, labelB, badgeB, flashB, options.boule, rarities[0]);
      const p2 = animateSlot(cardT, imgT, labelT, badgeT, flashT, options.tir, rarities[1]);
      const p3 = animateSlot(cardP, imgP, labelP, badgeP, flashP, options.puissance, rarities[2]);
      const [r1,r2,r3] = await Promise.all([p1,p2,p3]);
      currentResults = { boule:r1, tir:r2, puissance:r3 };

      // show controls and start timer now
      if (controlsRow) controlsRow.style.display = 'flex';
      timerEl.style.display = 'block'; startTimer();
    }

    // ---------- Bowling phase implementation ----------
    let bowlingPhaseActive = false;
    let laneInitialized = false;
    let laneCanvas, laneCtx, laneW, laneH;
    let positionCount = 5, selectedPos = 2, directionSign = 1;
    let laneTimerDuration = 10, laneTimerInterval = null, laneTimerStart = 0;
    let simRunning = false, simFrame = null;
    let ball = null, pins = [], particles = [];
    let currentBowlingIdx = 0;
    const DEFAULT_PIN_COUNT = 10;

    function initLane(){
      if (laneInitialized) return; laneInitialized = true;
      laneCanvas = document.getElementById('laneCanvas'); laneCtx = laneCanvas.getContext('2d');
      laneW = laneCanvas.width; laneH = laneCanvas.height;
      const posCol = document.getElementById('positionColumn');
      for (let i=0;i<positionCount;i++){
        const d = document.createElement('div'); d.className='pos-dot'; d.dataset.idx = i; d.addEventListener('click', ()=>{ setSelectedPos(parseInt(d.dataset.idx,10)); });
        posCol.appendChild(d);
      }
      setSelectedPos(selectedPos);
      window.addEventListener('resize', ()=>{ const newW = Math.min(820, Math.floor(window.innerWidth*0.82)); laneCanvas.width = newW; laneW = laneCanvas.width; laneH = laneCanvas.height; computePins(); drawLane(); });
      document.getElementById('changeDirBtn').addEventListener('click', ()=>{ directionSign *= -1; drawLane(); });
      document.getElementById('shootBtn').addEventListener('click', ()=>{ shootCurrent(); });
      computePins(); drawLane();
    }

    function startBowlingPhase(){
      bowlingPhaseActive = true; document.getElementById('laneArea').style.display = 'block'; currentBowlingIdx = 0; order.forEach(p=> p.score = p.score || 0);
      initLane(); startBowlingTurn(0);
    }

    function setSelectedPos(idx){ selectedPos = idx; const dots = document.querySelectorAll('.pos-dot'); dots.forEach(d=> d.classList.toggle('active', parseInt(d.dataset.idx,10)===idx)); drawLane(); }

    function startBowlingTurn(idx){
      // reset ongoing simulation and lane for the next player
      if (simFrame) { cancelAnimationFrame(simFrame); simFrame = null; }
      simRunning = false; ball = null; particles = [];
      computePins();
      // apply per-player removed pins (from rerolls)
      const ptemp = order[idx];
      if (ptemp && typeof ptemp.availablePins === 'number' && ptemp.availablePins > 0 && ptemp.availablePins < pins.length){
        const removeCount = pins.length - ptemp.availablePins;
        if (removeCount > 0){ pins.splice(-removeCount); }
      }
      drawLane();
      currentBowlingIdx = idx; if (idx >= order.length){ finishBowlingAndShowLeaderboard(); return; }
      const p = order[idx]; Array.from(orderEl.children).forEach(c=>{ c.classList.remove('active'); c.style.boxShadow = ''; });
      const chip = orderEl.querySelector(`[data-player="${p.name}"]`); if (chip){ chip.classList.add('active'); chip.style.boxShadow = `0 0 22px ${p.color}55`; }
      showStatus(`<strong style="color:${p.color}">${p.name}, choisis ta position</strong>`);
      const chosen = document.getElementById('chosenDisplay'); chosen.innerHTML = '';
      try{ const boule = p.choice.boule; const tir = p.choice.tir; const puiss = p.choice.puissance;
        const s1 = document.createElement('div'); s1.className='chosen-square'; s1.innerHTML = `<img src="${boule.img}" style="max-width:36px;max-height:28px"/><div style="font-size:0.65rem;margin-top:3px">${boule.label}</div>`;

      // hide the order display and remove per-pill score badges
      const ord = document.getElementById('order'); if (ord) ord.style.display = 'none'; document.querySelectorAll('.pill-score').forEach(el=> el.style.display='none');
      const board = document.createElement('div'); board.id='endLeaderboard'; board.style.maxWidth='720px'; board.style.margin='14px auto'; board.style.textAlign='left'; const title = document.createElement('h3'); title.textContent = 'CLASSEMENT'; board.appendChild(title); const sorted = order.slice().sort((a,b)=>{ if (b.score !== a.score) return b.score - a.score; const ta = a.lastPointTime || Infinity; const tb = b.lastPointTime || Infinity; return ta - tb; }); sorted.forEach((p,idx)=>{ const r = document.createElement('div'); r.style.display='flex'; r.style.justifyContent='space-between'; r.style.padding='8px'; r.style.borderBottom='1px solid rgba(255,255,255,0.04)'; r.innerHTML = `<div>#${idx+1} ${p.name}</div><div style="font-weight:900">${p.score} pts</div>`; board.appendChild(r); }); const ret = document.createElement('button'); ret.className='return-btn'; ret.textContent='Retour'; ret.addEventListener('click', ()=> window.location.href='index.html'); board.appendChild(ret); showStatus('Fin du bowling'); document.getElementById('status').parentNode.insertBefore(board, document.getElementById('status').nextSibling); updatePlayerBarRanking(sorted); }

    // small helper copied from game-11 to show scores in player bar
    function updatePlayerScoreInPill(player){ const bar = document.querySelector('.player-bar'); if (!bar){ window.addEventListener('load', function onLoad(){ window.removeEventListener('load', onLoad); updatePlayerScoreInPill(player); }); return; } const pills = Array.from(bar.querySelectorAll('.player-pill')); pills.forEach(pill=>{ const name = pill.querySelector('span:nth-child(2)')?.textContent?.trim(); if (name === player.name){ if (!pill.style.position) pill.style.position='relative'; let el = pill.querySelector('.pill-score'); if (!el){ el = document.createElement('div'); el.className='pill-score'; Object.assign(el.style,{ position:'absolute', right:'8px', top:'50%', transform:'translateY(-50%)', fontWeight:'900', color:'#fff', background:'rgba(0,0,0,0.16)', padding:'2px 6px', borderRadius:'8px', fontSize:'0.85rem' }); pill.appendChild(el); } el.textContent = `${player.score} pts`; } }); }

    function updatePlayerBarRanking(sorted){ const bar = document.querySelector('.player-bar'); if (!bar) return; const pills = Array.from(bar.querySelectorAll('.player-pill')); pills.forEach(pill=>{ const name = pill.querySelector('span:nth-child(2)')?.textContent?.trim(); const idx = sorted.findIndex(p=> p.name === name); let badge = pill.querySelector('.rank-badge'); if (!badge){ badge = document.createElement('span'); badge.className = 'rank-badge'; Object.assign(badge.style,{ marginLeft:'auto', fontWeight:'900', fontSize:'0.85rem', padding:'2px 6px', borderRadius:'99px', background:'rgba(255,255,255,0.8)', color:'#000' }); pill.appendChild(badge); } if (idx === -1){ badge.textContent=''; pill.style.boxShadow='none'; pill.style.border='1px solid rgba(255,255,255,0.28)'; pill.style.background='rgba(15,24,46,0.95)'; } else { const rank = idx + 1; const rankColor = rank === 1 ? '#ffd700' : rank === 2 ? '#c0c0c0' : rank === 3 ? '#cd7f32' : '#8a2be2'; badge.textContent = `#${rank}`; pill.style.border = `1px solid ${rankColor}`; pill.style.boxShadow = `0 0 0 2px ${rankColor}`; pill.style.background = 'rgba(255,255,255,0.13)'; if (typeof setACText === 'function') setACText(pill, rank, sorted.length); } }); }

    
    function validateCurrent(){ stopTimer(); const p = order[currentIdx]; if (!p) return; p.choice = currentResults; // store
      // mark player's pill with a small check
      const bar = document.querySelector('.player-bar'); if (bar){ const pill = Array.from(bar.querySelectorAll('.player-pill')).find(pp=> pp.querySelector('span:nth-child(2)').textContent.trim() === p.name); if (pill){ let ok = pill.querySelector('.choice-ok'); if (!ok){ ok = document.createElement('span'); ok.className='choice-ok'; ok.textContent='✓'; ok.style.marginLeft='8px'; ok.style.color='#9fffb0'; ok.style.fontWeight='900'; pill.appendChild(ok); } } }
      // next player
      const next = currentIdx+1; if (next >= order.length){ // finished -> start bowling phase
        selector.style.display = 'none'; stopTimer(); timerEl.style.display='none'; showStatus('Tous les joueurs ont choisi — lancement de la piste...'); startBowlingPhase(); return; }
      startSelection(next);
    }

    function rerollAction(){ // rerun animation and reset timer
      // small flash on all cards
      cardB.querySelector('.flash').classList.add('show'); cardT.querySelector('.flash').classList.add('show'); cardP.querySelector('.flash').classList.add('show'); setTimeout(()=>{ cardB.querySelector('.flash').classList.remove('show'); cardT.querySelector('.flash').classList.remove('show'); cardP.querySelector('.flash').classList.remove('show'); }, 180);
      // decrement available pins for current player (stackable)
      const p = order[currentIdx];
      if (p){ if (typeof p.availablePins !== 'number') p.availablePins = DEFAULT_PIN_COUNT; if (p.availablePins > 1){ p.availablePins = Math.max(1, p.availablePins - 1); } if (p.availablePins <= 1) rerollBtn.style.display = 'none'; else rerollBtn.style.display = 'inline-block'; }
      // float -1 quille (subtle) with remaining count
      floatMinus.textContent = '-1 quille' + (p ? ` (${p.availablePins})` : ''); floatMinus.classList.add('show'); setTimeout(()=> { floatMinus.classList.remove('show'); floatMinus.textContent = '-1 quille'; }, 900);
      // show subtle full-screen overlay briefly
      const overlay = document.getElementById('rerollOverlay'); if (overlay){ overlay.classList.add('show'); setTimeout(()=> overlay.classList.remove('show'), 400); }
      // restart slot animations (controls hidden by playAllSlots)
      stopTimer(); playAllSlots();
    }

    validateBtn.addEventListener('click', ()=>{ validateCurrent(); });
    rerollBtn.addEventListener('click', ()=>{ rerollAction(); });

    function startSelection(idx){
      currentIdx = idx; // highlight chip
      Array.from(orderEl.children).forEach(c=>{ c.classList.remove('active'); c.style.boxShadow = ''; });
      const chip = orderEl.querySelector(`[data-player="${order[currentIdx].name}"]`);
      if (chip){ chip.classList.add('active'); chip.style.boxShadow = `0 0 22px ${order[currentIdx].color}55`; }
      selector.style.display = 'block'; showStatus(`<strong style="color:${order[currentIdx].color}">${order[currentIdx].name}, choisis tes paramètres</strong>`);
      // start machine reels
      // prepare reroll button for this player
      const p = order[currentIdx]; if (p){ if (typeof p.availablePins !== 'number') p.availablePins = DEFAULT_PIN_COUNT; rerollBtn.style.display = p.availablePins > 1 ? 'inline-block' : 'none'; }
      playAllSlots();
    }

    // initial flow
    renderOrder(); announceOrder();
  })();
  </script>
  <div id="rerollOverlay" class="reroll-overlay"></div>
</body>
</html>
