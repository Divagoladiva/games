<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Case Aboubattle</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body{background:#081028;color:#fff;font-family:Segoe UI,Roboto,Arial;margin:0;padding:18px}
    main{max-width:980px;margin:8px auto;text-align:center;padding-bottom:140px}
    h1{margin:8px 0 12px;font-size:2.2rem}
    #status{min-height:34px;margin-bottom:12px;font-weight:900;font-size:1.2rem}

    /* player-bar styles are provided by style.css (shared with game-10) */

    .player-order{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:12px 0}
    .player-chip{padding:10px 12px;border-radius:12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);font-weight:800}
    .choice-container{display:flex;gap:22px;justify-content:center;align-items:center;margin-top:18px}
    .choice-btn{width:220px;height:220px;border-radius:16px;background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));border:1px solid rgba(255,255,255,0.06);display:inline-flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:1.05rem;cursor:pointer;box-shadow:0 8px 30px rgba(2,6,20,0.45);transform:translateY(12px) scale(0.98);opacity:0;animation:popIn .45s cubic-bezier(.2,.9,.2,1) forwards}
    .choice-btn img{max-width:78%;max-height:78%;display:block}
    .choice-btn:hover{transform:translateY(-6px) scale(1.02);box-shadow:0 16px 40px rgba(2,6,20,0.55)}
    .choice-btn:nth-child(1){animation-delay:0.06s}
    .choice-btn:nth-child(2){animation-delay:0.18s}
    @keyframes popIn{from{opacity:0;transform:translateY(12px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
    /* tooltip for dream button */
    .tooltip{position:fixed;padding:8px 10px;border-radius:8px;background:rgba(9,15,34,0.96);color:#eaf0ff;font-weight:800;font-size:0.95rem;pointer-events:none;z-index:10005;transform:translate(-50%,6px);opacity:0;transition:transform .18s cubic-bezier(.2,.9,.2,1),opacity .18s ease;box-shadow:0 8px 24px rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.04)}
    .tooltip.show{opacity:1;transform:translate(-50%,-6px)}

    /* stacks overlay */
    .stacks-overlay{position:fixed;left:20%;width:60%;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:16px;align-items:stretch;z-index:10000;max-height:80vh;overflow:auto;padding:8px}
    .player-stack-rect{position:relative;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:12px 10px;min-height:0;box-shadow:0 8px 26px rgba(0,0,0,0.44);overflow:hidden;display:flex;align-items:center}
    .player-stack-name{position:absolute;left:10px;top:8px;font-weight:900;font-size:0.85rem;padding:4px 8px;border-radius:6px;background:rgba(0,0,0,0.65);box-shadow:0 6px 18px rgba(0,0,0,0.45);z-index:6;pointer-events:none}
    .open-btn{position:absolute;right:12px;bottom:10px;background:#36c56d;color:#07221a;border:none;padding:8px 12px;border-radius:8px;font-weight:900;cursor:pointer;box-shadow:0 6px 20px rgba(54,197,109,0.12)}
    .open-global-btn{position:fixed;left:20%;width:60%;bottom:80px;height:56px;background:linear-gradient(135deg,#36c56d,#2aa85a);color:#07221a;border:none;border-radius:12px;font-weight:900;font-size:1.05rem;cursor:pointer;box-shadow:0 12px 36px rgba(0,0,0,0.45);z-index:10006;display:inline-flex;align-items:center;justify-content:center}
    .open-global-btn:active{transform:translateY(2px)}
    .pin-line{position:absolute;left:50%;top:0;bottom:0;width:2px;background:rgba(255,255,255,0.95);transform:translateX(-50%);pointer-events:none;z-index:3}
    .slot-track{display:flex;align-items:center;gap:8px;will-change:transform;z-index:1}
    .slot-square{border-radius:6px;background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.06));box-shadow:inset 0 1px 0 rgba(255,255,255,0.02);flex:0 0 auto;transition:transform .12s ease, box-shadow .12s ease}
    .slot-square.lift{transform:translateY(-10px) scale(1.04);box-shadow:0 18px 36px rgba(0,0,0,0.24)}
    /* rarity backgrounds / halo */
    .slot-square.rarity-blue{border:2px solid #024FE4;background-image:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.06)), linear-gradient(180deg, rgba(2,79,228,0.06), rgba(2,79,228,0.02));box-shadow:0 0 8px rgba(2,79,228,0.28), inset 0 1px 0 rgba(255,255,255,0.02)}
    .slot-square.rarity-purple{border:2px solid #6832EA;background-image:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.06)), linear-gradient(180deg, rgba(104,50,234,0.06), rgba(104,50,234,0.02));box-shadow:0 0 8px rgba(104,50,234,0.28), inset 0 1px 0 rgba(255,255,255,0.02)}
    .slot-square.rarity-pink{border:2px solid #9E00C5;background-image:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.06)), linear-gradient(180deg, rgba(158,0,197,0.06), rgba(158,0,197,0.02));box-shadow:0 0 8px rgba(158,0,197,0.28), inset 0 1px 0 rgba(255,255,255,0.02)}
    .slot-square.rarity-red{border:2px solid #BB171A;background-image:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.06)), linear-gradient(180deg, rgba(187,23,26,0.06), rgba(187,23,26,0.02));box-shadow:0 0 8px rgba(187,23,26,0.28), inset 0 1px 0 rgba(255,255,255,0.02)}
    .slot-square.rarity-gold{border:2px solid #DFC700;background-image:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.06)), linear-gradient(180deg, rgba(223,199,0,0.08), rgba(223,199,0,0.03));box-shadow:0 0 12px rgba(223,199,0,0.45), inset 0 1px 0 rgba(255,255,255,0.02)}
    :root{--won-scale:1}
    .won-outside{position:fixed;display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none;z-index:10007;opacity:0;transform:translate(-50%,-50%) scale(var(--won-scale,0.88));transition:transform .28s cubic-bezier(.2,.9,.2,1),opacity .22s ease}
    .won-outside.show{opacity:1;transform:translate(-50%,-50%) scale(var(--won-scale,1))}
    .won-outside.hide{opacity:0;transform:translate(-50%,-50%) scale(calc(var(--won-scale,1) * 0.86))}
    .won-item{display:flex;flex-direction:column;align-items:center;padding:0;border-radius:0;background:transparent;min-width:0;border:none;box-shadow:none;gap:2px}
    .won-item img{width:120px;height:120px;object-fit:contain;border-radius:0}
    .won-img-wrap{position:relative;width:96px;height:96px;display:flex;align-items:center;justify-content:center}
    .won-glow{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:64px;height:64px;background-size:contain;background-repeat:no-repeat;border-radius:50%;opacity:0.45;z-index:0;pointer-events:none;mix-blend-mode:screen;filter:blur(1px);animation:won-spin 18s linear infinite}
    @keyframes won-spin{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}
    .won-skin-out{position:relative;z-index:1;width:120px;height:120px;object-fit:contain;border-radius:0}
    .won-label{font-size:0.95rem;font-weight:700;margin:0;color:#fff;text-align:center;word-break:break-word}
    .won-info{display:flex;gap:8px;align-items:center;font-size:0.78rem;color:rgba(255,255,255,0.85);font-weight:700;margin-bottom:0}
    .won-float{font-family:monospace;background:rgba(255,255,255,0.03);padding:2px 6px;border-radius:6px;font-weight:800}
    .won-condition{font-size:0.78rem;color:rgba(255,255,255,0.9);font-weight:700}
    .won-stattrack{font-size:0.78rem;color:#FF8A00;font-weight:900;margin-top:6px}
    .won-prices{display:flex;flex-direction:column;align-items:center;gap:4px;margin-top:-10px;position:relative;z-index:10009}
    .won-est{position:relative;z-index:10010}
    .won-price-base{color:#fff;font-weight:800}
    .won-price-stattrack{color:#FF8A00;font-weight:900}
    .won-est{font-size:0.9rem;font-weight:900;margin-top:0}
    .slot-square .slot-skin{width:100%;height:100%;object-fit:cover;display:block}
    /* header shown above persistent best-item displays */
    .best-items-header{position:fixed;font-weight:900;background:rgba(0,0,0,0.35);padding:6px 10px;border-radius:8px;color:#fff;z-index:10008;pointer-events:none;font-size:1rem;transform:translateX(-50%)}
    /* small return button: hidden by default, shown as a compact bottom-right button when needed */
    .back-btn{display:none;position:fixed;border:none;cursor:pointer;font-weight:900;z-index:10007}
    .back-btn.small{right:12px;bottom:12px;left:auto;top:auto;width:auto;height:36px;padding:6px 10px;border-radius:8px;font-size:0.85rem;background:#ff776d;color:#fff;box-shadow:0 8px 20px rgba(0,0,0,0.4)}
    /* Gold flash overlay for rare gold reveals */
    .gold-flash{position:fixed;inset:0;pointer-events:none;z-index:10005;opacity:0;transition:opacity .22s ease,transform .22s ease;transform:scale(1);background:radial-gradient(circle at 50% 40%, rgba(223,199,0,0.22), rgba(223,199,0,0.12) 30%, rgba(223,199,0,0.06) 45%, rgba(0,0,0,0) 70%)}
    .gold-flash.show{opacity:1;transform:scale(1.02)}

    /* Player bar responsive tweaks to avoid overlap (rank + money) */
    .player-bar{display:flex;gap:8px;flex-wrap:nowrap;justify-content:center;align-items:center;width:100%;max-width:calc(100vw - 36px);margin:0 auto;overflow-x:auto;padding:6px 18px;box-sizing:border-box}
    .player-pill{display:flex;align-items:center;gap:8px;padding:8px 12px;min-width:120px;max-width:640px;flex:0 1 auto;box-sizing:border-box;border-radius:10px;position:relative}
    .player-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:800}
    .pill-value{margin-left:auto;margin-right:8px;font-weight:900;color:#fff;background:rgba(0,0,0,0.16);padding:2px 6px;border-radius:8px;font-size:0.85rem;white-space:nowrap}
    .rank-badge{margin-right:8px;display:inline-flex;align-items:center;justify-content:center}

    /* Make won-outside-right labels narrower and allow wrapping */
    .won-outside-right .won-label{max-width:120px;white-space:normal;overflow-wrap:break-word;word-break:break-word;margin-top:0;position:relative;top:20px;z-index:10020}
    .won-outside-right .won-prices{margin-top:-20px;margin-bottom:0}

    /* Open button + classement wrapper (centered under stacks by JS) */
    .open-global-wrap{position:fixed;left:50%;transform:translateX(-50%);bottom:auto;width:auto;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;z-index:10006}
    .open-global-wrap .open-global-btn{position:relative;left:auto;bottom:auto;width:auto;min-width:140px}
    .open-row{display:flex;align-items:center;gap:12px}
    .size-wrap{display:inline-flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;background:rgba(0,0,0,0.06)}
    .size-label{font-weight:900;color:#fff;font-size:0.9rem}
    .size-slider{width:140px;height:6px;border-radius:8px;background:linear-gradient(90deg,#ffb347,#ff7e5f);-webkit-appearance:none;appearance:none;outline:none}
    .size-slider::-webkit-slider-thumb{width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.3);-webkit-appearance:none}
    .rank-toggle-btn{background:linear-gradient(135deg,#ffc857,#ff8c00);color:#07221a;border:none;border-radius:12px;font-weight:900;font-size:1.05rem;height:56px;padding:8px 16px;cursor:pointer;box-shadow:0 12px 36px rgba(0,0,0,0.25)}
    .rank-toggle-btn:active{transform:translateY(2px)}
    /* Skip button (fade in/out) */
    .skip-btn{background:linear-gradient(135deg,rgba(255,255,255,0.06),rgba(255,255,255,0.04));color:#fff;border:none;border-radius:12px;font-weight:900;font-size:0.95rem;height:44px;padding:8px 12px;cursor:pointer;box-shadow:0 10px 30px rgba(0,0,0,0.25);opacity:0;transform:translateY(8px);transition:opacity .18s ease,transform .18s ease;display:inline-flex;align-items:center;justify-content:center}
    .skip-btn.show{opacity:1;transform:translateY(0)}
    .rank-toggle-btn:active{transform:translateY(2px)}
    .rank-wrap{display:inline-flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;background:rgba(0,0,0,0.08)}
    .rank-label{font-weight:900;color:#fff;font-size:0.9rem;margin-right:4px}
    /* Top-right popup used after skin animation ends (fade in/out) — enlarged */
    .top-right-popup{position:fixed;top:18px;right:18px;z-index:11000;padding:14px 18px;border-radius:12px;background:rgba(9,15,34,0.98);color:#FFD700;font-weight:800;border:1px solid rgba(255,255,255,0.06);box-shadow:0 18px 48px rgba(2,6,20,0.7);opacity:0;transform:translateY(-8px) scale(.98);transition:opacity .32s ease,transform .32s cubic-bezier(.2,.9,.2,1);pointer-events:none;min-width:260px;font-size:1.05rem;text-align:center;text-shadow:0 2px 6px rgba(255,215,0,0.18)}
    .top-right-popup.show{opacity:1;transform:translateY(0) scale(1.02);pointer-events:auto}
    /* popup particle burst (simple DOM particles) */
    .popup-particle{position:fixed;border-radius:50%;pointer-events:none;z-index:11002;mix-blend-mode:screen;box-shadow:0 6px 18px rgba(0,0,0,0.35);transform:translate(-50%,-50%);will-change:transform,opacity}
      /* tiny event selector - discret bouton top-left */
      #tinyEventBtn{position:fixed;top:8px;left:8px;width:18px;height:18px;border-radius:6px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);z-index:12010;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0.75;transition:transform .12s ease,opacity .12s ease}
      #tinyEventBtn:hover{opacity:1;transform:translateY(-1px) scale(1.05)}
      #tinyEventBtn::after{content:'';display:block;width:6px;height:6px;border-radius:50%;background:linear-gradient(180deg,#fff,#cfd8ff);opacity:0.95}
      #tinyEventPanel{position:fixed;top:36px;left:8px;min-width:160px;max-width:260px;background:rgba(9,15,34,0.98);color:#eaf0ff;border:1px solid rgba(255,255,255,0.06);padding:8px;border-radius:8px;box-shadow:0 10px 30px rgba(2,6,20,0.7);z-index:12010;display:none;flex-direction:column;gap:8px;font-weight:800}
    #tinyEventPanel.show{display:flex}
    /* options: fond blanc + texte noir pour lisibilité (évite blanc sur blanc) */
    #tinyEventPanel select{width:100%;padding:6px 8px;border-radius:6px;background:#ffffff;color:#07221a;border:1px solid rgba(0,0,0,0.12);font-weight:700}
      .tinyEventActions{display:flex;gap:8px;justify-content:flex-end}
      .tinyEventActions button{padding:6px 8px;border-radius:6px;border:none;background:rgba(255,255,255,0.04);color:#fff;cursor:pointer;font-weight:800}
      .tinyEventActions button.confirm{background:linear-gradient(135deg,#36c56d,#2aa85a);color:#07221a}
      .tinyEventActions button.cancel{background:transparent;border:1px solid rgba(255,255,255,0.04)}
  </style>
</head>
<body>
  <!-- petit bouton discret pour choisir le prochain événement -->
  <button id="tinyEventBtn" aria-label="Choisir le prochain événement" title="Choisir le prochain événement" type="button"></button>
  <div id="tinyEventPanel" aria-hidden="true" role="dialog" aria-label="Sélectionner le prochain événement">
    <select id="tinyEventSelect" aria-label="Liste des événements">
      <option value="">— Choisir —</option>
    </select>
    <div class="tinyEventActions">
      <button class="cancel" type="button">Annuler</button>
      <button class="confirm" type="button">OK</button>
    </div>
  </div>
  <main>
    <h1>Case Aboubattle</h1>
    <div id="status">Chargement des joueurs...</div>

    <div id="choiceContainer" class="choice-container" aria-hidden="false"></div>
  </main>

  <div class="player-bar" id="playerBar" aria-live="polite"></div>
  <!-- top-right popup element (hidden by default) -->
  <div id="topRightPopup" class="top-right-popup" aria-hidden="true">texte de test</div>
  <div style="width:100%;max-width:920px;margin-top:8px">
    <script src="game-players.js"></script>
  </div>
  <div id="goldFlash" class="gold-flash" aria-hidden="true"></div>
  <script>
  (function(){
    const stored = JSON.parse(localStorage.getItem('mini-Jeux-host-players') || '[]');
    const statusEl = document.getElementById('status');
    let playerBar = document.getElementById('playerBar');
    // Robust: ensure only one `.player-bar` exists. Keep the first/preferred and remove any extras.
    function normalizePlayerBar(){
      try{
        const bars = Array.from(document.querySelectorAll('.player-bar'));
        if (bars.length <= 1) return;
        // prefer element with id 'playerBar' if present and in DOM, otherwise use the first
        let preferred = document.getElementById('playerBar') || bars[0];
        if (!preferred || !document.body.contains(preferred)) preferred = bars[0];
        bars.forEach(b => { if (b !== preferred && b.parentNode) b.parentNode.removeChild(b); });
        playerBar = preferred;
      }catch(e){}
    }
    // run initial normalization
    normalizePlayerBar();
    // observe DOM additions for a short time to remove any player-bar duplicates created later
    try{
      const obs = new MutationObserver((mutations) => {
        let found = false;
        for (const m of mutations){
          if (m.addedNodes && m.addedNodes.length){
            for (const n of m.addedNodes){
              if (n.nodeType === 1){
                if (n.classList && n.classList.contains && n.classList.contains('player-bar')){ found = true; break; }
                if (n.querySelector && n.querySelector('.player-bar')){ found = true; break; }
              }
            }
          }
          if (found) break;
        }
        if (found) normalizePlayerBar();
      });
      obs.observe(document.body, { childList: true, subtree: true });
      // stop observing after a short grace period
      setTimeout(()=>{ try{ obs.disconnect(); }catch(e){} }, 6000);
    }catch(e){}
    const choiceContainer = document.getElementById('choiceContainer');

    if (!stored.length){ statusEl.textContent = 'Aucun joueur enregistré.'; return; }

    const players = stored.map((p, idx) => ({ name: p.name, color: p.color || '#8ac6ff', totalValue: 0, bestItemPrice: 0, bestItemName: '', bestItemSrc: '', bestItemRarityColor: p.color || '#8ac6ff', index: idx }));

    // AC display control: do not show AC badges until finalization (after 10/10 and animations finished)
    let showACs = false;
    let pendingRanking = null;
    let acApplyIntervalId = null;
    let acApplyTries = 0;
    // ranking toggle and open counter (shared across closures)
    let rankEnabled = false;
    let openCount = 0;
    // popup scheduling: predetermined openings (Set of integers), assigned messages and helpers
    let popupSchedule = null;
    let popupMessageMap = null;
    let lastPopupDecisionOpen = -1;
    let lastPopupShownOpen = -2;
    // skip/finish flags for animations
    let skipRequested = false;
    let finalRankingApplied = false;
    let tempRankingShown = false;
    // active animation finishers: map rect element -> finalize function
    const activeAnimationFinishers = new Map();
    function applyACsNow(sorted){
      try{
        const bar = document.querySelector('.player-bar'); if (!bar) return;
        const pills = Array.from(bar.querySelectorAll('.player-pill'));
        pills.forEach(pill => {
          try{
            const ds = pill.dataset && pill.dataset.playerIndex ? parseInt(pill.dataset.playerIndex,10) : null;
            const pname = (ds !== null && players[ds]) ? players[ds].name : (pill.querySelector('.player-name')?.textContent?.trim());
            const idx = sorted.findIndex(r => r.name === pname);
            if (idx >= 0 && typeof setACText === 'function'){
              try{ setACText(pill, idx+1, sorted.length); } catch(e){}
            }
          }catch(e){}
        });
      }catch(e){}
    }
    function scheduleApplyACs(sorted){
      try{
        pendingRanking = sorted;
        if (!showACs) return;
        if (typeof setACText === 'function'){ applyACsNow(sorted); pendingRanking = null; return; }
        acApplyTries = 0; if (acApplyIntervalId) { clearInterval(acApplyIntervalId); acApplyIntervalId = null; }
        acApplyIntervalId = setInterval(()=>{
          acApplyTries++;
          if (typeof setACText === 'function'){ applyACsNow(sorted); pendingRanking = null; clearInterval(acApplyIntervalId); acApplyIntervalId = null; }
          else if (acApplyTries > 20){ clearInterval(acApplyIntervalId); acApplyIntervalId = null; pendingRanking = null; }
        }, 300);
      }catch(e){}
    }

    // render player-bar (structure identical to game-10)
    playerBar.innerHTML = '';
    players.forEach((p, idx) => {
      const pill = document.createElement('div');
      pill.className = 'player-pill';
      pill.dataset.playerIndex = String(idx);
      pill.style.border = '1px solid ' + p.color;
      pill.style.position = pill.style.position || '';
      const avatar = document.createElement('span'); avatar.className = 'player-circle'; avatar.style.background = p.color;
      const name = document.createElement('span'); name.className = 'player-name'; name.textContent = p.name;
      pill.appendChild(avatar);
      pill.appendChild(name);
      // value badge (initially $0.00, will be updated when items are awarded)
      const val = document.createElement('div');
      val.className = 'pill-value';
      val.textContent = '$0.00';
      pill.appendChild(val);
      playerBar.appendChild(pill);
      // AC badges are intentionally deferred until the end (10/10). They will be applied after finalization.
    });

    // show two choice buttons immediately (no order/randomization)
    statusEl.textContent = 'Choisis une option';
    choiceContainer.innerHTML = '';
    const btn1 = document.createElement('button'); btn1.className = 'choice-btn'; btn1.id = 'choice1';
    const img = document.createElement('img'); img.src = 'assets/game-16/dream&nightmare.png'; img.alt = 'Dream & Nightmare'; btn1.appendChild(img);
    const btn2 = document.createElement('button'); btn2.className = 'choice-btn'; btn2.id = 'choice2'; btn2.textContent = 'Prochainement...';
    choiceContainer.appendChild(btn1); choiceContainer.appendChild(btn2);

    // Note: AC badges will be applied at finalization only.

    // tooltip logic for hover on btn1
    let tooltipEl = null;

      function formatMoney(v){ try { return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:2}).format(v); } catch(e){ return '$' + Number(v).toFixed(2); } }

        // update the monetary total shown in a player's pill
        function updatePlayerValueInPill(player){
          try{
            const bar = document.querySelector('.player-bar');
            if (!bar) return;
            // prefer finding by data-player-index to avoid DOM structure fragility
            const idx = (typeof player.index !== 'undefined') ? parseInt(player.index,10) : null;
            let pill = null;
            if (idx !== null){ pill = bar.querySelector('.player-pill[data-player-index="' + idx + '"]'); }

              const pills = Array.from(bar.querySelectorAll('.player-pill'));

            }
            if (!pill) return;

            if (!el){ el = document.createElement('div'); el.className='pill-value'; pill.appendChild(el); }
            el.textContent = formatMoney(player.totalValue || 0);
            try{ if (showACs && typeof setACText === 'function') setACText(pill, 0, players.length); }catch(e){}

      function estimatePrice(min, max, durability){
        // durability in [0,1] where 1 -> price near min, 0 -> price near max
        return min + (1 - durability) * (max - min);
      }

      function getPriceInfoForSkinName(name){
        try{
          const decoded = decodeURIComponent(String(name || ''));
          const clean = decoded.replace(/\.[^/.]+$/, '');
          return priceData[clean] || null;
        }catch(e){ return null; }
      }

      function skinMatchesPriceFilter(name, filter){
        const info = getPriceInfoForSkinName(name);
        if (!info) return false;
        const baseMin = Number(info.baseMin);
        const baseMax = Number(info.baseMax);
        const statMin = Number(info.statMin);
        const statMax = Number(info.statMax);
        if (!Number.isFinite(baseMin) || !Number.isFinite(baseMax) || !Number.isFinite(statMin) || !Number.isFinite(statMax)) return false;
        if (filter && filter.mode === 'under') return baseMax < filter.threshold && statMax < filter.threshold;
        if (filter && filter.mode === 'over') return baseMin > filter.threshold && statMin > filter.threshold;
        return true;
      }

      function getActivePriceFilter(){
        const text = String(activePopupString || '').toLowerCase();
        if (!text) return null;
        if (/skins<1\$|skins < 1\$|skin<1\$|skin < 1\$/.test(text)) return { mode: 'under', threshold: 1 };
        return null;
      }

      function getEligibleRaritiesForPriceFilter(filter){
        const raritiesToTry = ['blue', 'purple', 'pink', 'red', 'gold'];
        return raritiesToTry.filter(rarity => {
          const pool = rarity === 'blue' ? blueSkins : rarity === 'purple' ? purpleSkins : rarity === 'pink' ? pinkSkins : rarity === 'red' ? redSkins : rarity === 'gold' ? goldSkins : [];
          if (!pool || !pool.length) return false;
          return pool.some(name => skinMatchesPriceFilter(name, filter));
        });
      }

      function pickSkinForRarity(rarity){
        const priceFilter = getActivePriceFilter();
        let pool = [];
        if (rarity === 'blue') pool = blueSkins;
        else if (rarity === 'purple') pool = purpleSkins;
        else if (rarity === 'pink') pool = pinkSkins;
        else if (rarity === 'red') pool = redSkins;
        else if (rarity === 'gold') pool = goldSkins;
        if (!pool || !pool.length) return null;
        let candidates = pool;
        if (priceFilter){
          candidates = pool.filter(name => skinMatchesPriceFilter(name, priceFilter));
          if (!candidates.length){
            const fallbackRarities = getEligibleRaritiesForPriceFilter(priceFilter);
            if (fallbackRarities.length){
              const fallbackPool = fallbackRarities.includes(rarity) ? pool : (fallbackRarities[0] === 'blue' ? blueSkins : fallbackRarities[0] === 'purple' ? purpleSkins : fallbackRarities[0] === 'pink' ? pinkSkins : fallbackRarities[0] === 'red' ? redSkins : fallbackRarities[0] === 'gold' ? goldSkins : []);
              candidates = fallbackPool.filter(name => skinMatchesPriceFilter(name, priceFilter));
            }
          }
        }
        if (!candidates.length) return null;
        const name = candidates[Math.floor(Math.random() * candidates.length)];
        const dir = rarity === 'gold' ? goldDir : skinsDir;
        return dir + encodeURIComponent(name);
      }

      function getActiveRarityOverrideForPlayer(playerIndex){
        const text = String(activePopupString || '').toLowerCase();
        if (!text) return null;
        if (/que des golds/.test(text) && /all/.test(text)) return 'gold';
        if (/1 gold garanti|1 gold/.test(text)){
          return activeGoldTargetPlayerIndex != null && playerIndex === activeGoldTargetPlayerIndex ? 'gold' : null;
        }
        if (/1 rouge garanti|1 rouge\b/.test(text)){
          return activeRedTargetPlayerIndex != null && playerIndex === activeRedTargetPlayerIndex ? 'red' : null;
        }
        if (/rouges?\s*(?:\/|et)?\s*roses?/.test(text) && /all/.test(text)) return ['red', 'pink'];
        return null;
      }

      function pickRarity(playerIndex){
        const override = getActiveRarityOverrideForPlayer(playerIndex);
        if (override === 'gold') return 'gold';
        if (override === 'red') return 'red';
        if (Array.isArray(override)) return override[Math.floor(Math.random() * override.length)];
        const priceFilter = getActivePriceFilter();
        if (priceFilter){
          const eligibleRarities = getEligibleRaritiesForPriceFilter(priceFilter);
          if (eligibleRarities.length){
            return eligibleRarities[Math.floor(Math.random() * eligibleRarities.length)];
          }
        }
        const r = Math.random();
        for (let i=0;i<distribution.length;i++){ if (r <= distribution[i].cutoff) return distribution[i].id; }
        return distribution[distribution.length-1].id;
      }

      // apply a specific rarity (and skin) to an element
      function applyRarityToSquare(el, track, rarity, skinPath, playerIndex){
        if (!el) return;

      // create a slot square with rarity applied
      function createSquare(track, playerIndex){
        const sq = document.createElement('div');
        // assign a stable uid so we can preserve exact nodes across resizes
        try{ sq.dataset.uid = 's' + (uidCounter++); } catch(e){}
        randomizeSquare(sq, track, playerIndex);
        return sq;

      // keyboard handlers: numpad + and numpad - adjust chanceScale and log
      window.addEventListener('keydown', (ev)=>{
        // identify NumpadAdd / NumpadSubtract
        if (ev.code === 'NumpadAdd' || ev.key === '+'){
          chanceScale = Math.max(0.1, chanceScale * 1.2);
          distribution = buildDistribution(chanceScale);
          logChance();
          ev.preventDefault();
        } else if (ev.code === 'NumpadSubtract' || ev.key === '-'){
          chanceScale = Math.max(0.1, chanceScale / 1.2);
          distribution = buildDistribution(chanceScale);
          logChance();
          ev.preventDefault();
        }
      });

      // cleanup track: compute how many left squares are fully off-screen, then in one rAF compensate transform and remove/append to avoid flicker
      function cleanupTrackAfter(r){
        const track = r.querySelector('.slot-track'); if (!track) return;
        const parentRect = r.getBoundingClientRect();
        let removed = 0;
        // count how many leading children are offscreen (do not remove yet)
        for (let i=0;i<track.children.length;i++){
          const childRect = track.children[i].getBoundingClientRect();
          if (childRect.right < parentRect.left - 2) removed++; else break;
        }
        if (removed <= 0) return;
        const spacing = track._spacing || (track._squareSize + 8);
        const currTx = getTranslateX(track);
        // do DOM changes inside a rAF to batch paint and avoid flicker
        requestAnimationFrame(()=>{
          // compensate transform BEFORE removing nodes so visual position remains stable
          const newTx = currTx + spacing * removed;
          // disable transition to avoid animated jump
          const prevTrans = track.style.transition;
          track.style.transition = 'none';
          track.style.transform = `translateX(${newTx}px)`;
          // remove leading children and append same count at right
          for (let k=0;k<removed;k++){ if (track.firstChild) track.removeChild(track.firstChild); }
          for (let k=0;k<removed;k++){ track.appendChild(createSquare(track)); }
          // restore transition (if any)
          setTimeout(()=>{ track.style.transition = prevTrans || ''; }, 20);
          // update meta
          track._N = track.children.length;
          // adjust lifted square to current center
          const centerX = r.clientWidth / 2;
          const currentTx = getTranslateX(track);
          const startOffset = track._startOffset || 8;
          const sqSize = track._squareSize || 0;
          const shift = Math.max(6, Math.round(sqSize * 0.12));
          const centerRelativeToTrack = centerX - shift - currentTx - startOffset;
          const idx = Math.round((centerRelativeToTrack - sqSize/2) / spacing);
          Array.from(track.children).forEach((c, i)=> c.classList.toggle('lift', i === idx));
        });
      }

      // After an animation finishes, remove all squares after the first `keepLeft` ones (to avoid leftover squares
      // generated with an old chance). New squares will be generated when the user presses 'Ouvrir'.
      function trimTrackAfterAnimation(r, keepLeft = 4){

          for (let i = children.length - 1; i >= 0; i--){
            const ch = children[i];
            const cr = ch.getBoundingClientRect();
            if (cr.left > parentRect.right + 2) offRight.push(i);
          }
          if (!offRight.length){ track._N = track.children.length; return; }

          // ensure we keep at least `keepLeft` children in the track
          const maxRemovable = Math.max(0, track.children.length - keepLeft);
          const removeCount = Math.min(offRight.length, maxRemovable);
          for (let k = 0; k < removeCount; k++){
            const idx = offRight[k];
            if (track.children[idx]) track.removeChild(track.children[idx]);
          }
          track._N = track.children.length;

          Array.from(track.children).forEach(c => c.classList.remove('lift'));

      // Real-time updater for `.won-outside` positions so they remain vertically centered on their

        const fallbackOverlayRect = { left: Math.max(window.innerWidth * 0.1, 100), right: Math.min(window.innerWidth * 0.9, window.innerWidth - 100) };
        const outs = Array.from(document.querySelectorAll('.won-outside, .won-outside-right'));

          if (typeof lastPopupDecisionOpen !== 'undefined' && lastPopupDecisionOpen === openCount){

            return;
          }
          lastPopupDecisionOpen = openCount;

          console.log('scheduleMaybe called for open', openCount, 'popupVisible=', popupVisible, 'popupHideNext=', popupHideNext, 'schedule=', popupSchedule ? Array.from(popupSchedule).sort((a,b)=>a-b) : null);

          // do not show popup on the final (10th) opening; if visible and scheduled to hide, hide it
          if (typeof openCount !== 'undefined' && openCount >= 10){
            try{ if (popupVisible && popupHideNext) { console.log('scheduleMaybe: hiding popup on final open', openCount); hideTopRightPopup(); } }catch(e){}
            return;
          }

          // Manual selections are applied to the scheduled openings via `popupMessageMap`.
          // Do not show manual selections immediately here — they are applied when the scheduled opens occur.
          // if popup is visible and scheduled to hide on next finalize, hide it now
          if (popupVisible && popupHideNext){ console.log('scheduleMaybe: hiding popup (popupHideNext) at open', openCount); hideTopRightPopup(); return; }
          // if popup already visible (but not scheduled to hide), do nothing
          if (popupVisible){ console.log('scheduleMaybe: popup already visible, skipping show at open', openCount); return; }

          // if a predetermined schedule exists, follow it (strictly)
          if (popupSchedule){
            if (popupSchedule.has(openCount)){
              console.log('scheduleMaybe: popup scheduled for open', openCount);
              const msg = (popupMessageMap && popupMessageMap[openCount]) ? popupMessageMap[openCount] : 'texte de test';
              const multiplier = parseChanceEventText(msg);
              if (multiplier && !Number.isNaN(multiplier)){
                pendingChanceEvent = { text: msg, multiplier };
                console.log('Pending chance event for next open:', msg);
              }
              showTopRightPopup(msg);
              popupHideNext = true;
            } else {
              console.log('scheduleMaybe: not scheduled for open', openCount);
            }
            return;
          }
          // no schedule defined: do not show by default
          console.log('scheduleMaybe: no popupSchedule defined, skipping show for open', openCount);
        }catch(e){}
      }

      // programmatic chance increase (used by Numpad+ simulation)
      function increaseChanceProgrammatic(){ chanceScale = Math.max(0.1, chanceScale * 1.2); distribution = buildDistribution(chanceScale); logChance(); }

      // animation helper for one track (lift stays while square under ticker)
      function animateTrackForRect(r){
        const track = r.querySelector('.slot-track');
        if (!track) return;
        const playerIndex = r.dataset && r.dataset.playerIndex != null ? parseInt(r.dataset.playerIndex,10) : null;
        // clear previous lifts
        track.querySelectorAll('.slot-square').forEach(sq=> sq.classList.remove('lift'));
        const squareSize = track._squareSize || 48;
        const spacing = track._spacing || (squareSize + 8);
        const startOffset = track._startOffset || 8;
        const rectW = r.clientWidth;

        // compute visible count & scroll distance (several screens)
        const visibleCount = Math.max(6, Math.ceil(rectW / spacing) + 2);
        const extraScreens = 4 + Math.floor(Math.random() * 6); // 4..9 screens
        const deltaSquares = visibleCount * extraScreens;

        // ensure track has enough squares to cover the scroll distance
        const need = Math.max(0, visibleCount + deltaSquares + 4 - (track._N || 0));
        if (need > 0){
          for (let i=0;i<need;i++){ track.appendChild(createSquare(track, playerIndex)); }
          track._N = track.children.length;
        }

        // animate by moving left by deltaSquares * spacing from current translate (no teleport)
        const initialTranslate = getTranslateX(track) || 0;
        const deltaPx = deltaSquares * spacing;
        const finalTranslate = initialTranslate - deltaPx;
        const duration = animationDuration;
        const startTime = performance.now();
        let lastNearest = -1;
        let compensation = 0; // px added each time we recycle a leading node

        // disable track transition to avoid flicker while recycling
        const prevTrans = track.style.transition;
        track.style.transition = 'none';

        // finalizer accessible from outside (skip button)
        let _done = false;
        function finalizeOnce(){
          if (_done) return; _done = true;
          try{
            // ensure remaining leading squares are moved to the end so the DOM order matches the natural finish
            const recycledSoFar = Math.round(compensation / spacing) || 0;
            const remaining = Math.max(0, deltaSquares - recycledSoFar);
            for (let k = 0; k < remaining; k++){
              const first = track.firstChild; if (!first) break;
              try{ track.removeChild(first); track.appendChild(first); randomizeSquare(first, track); }catch(e){}
            }
            track._N = track.children.length;
            // set compensation as if all deltaSquares were recycled (so final transform matches natural end)
            compensation = spacing * deltaSquares;
          }catch(e){}
          // finalize position with compensation applied
          try{ track.style.transform = `translateX(${finalTranslate + compensation}px)`; }catch(e){}
          // restore transition
          setTimeout(()=>{ try{ track.style.transition = prevTrans || ''; }catch(e){} }, 20);
          // mark rect finalized to avoid double handling
          try{ r.dataset.finalized = '1'; }catch(e){}
          // show the won item for this rect before trimming
          try{ showWinForRect(r); } catch(e){}
          // --- popup logic: after an animation ends there is a 1/3 chance to show popup
          try{
            scheduleMaybeShowPopupAfterAnimation();
          }catch(e){}
          // trim right-side squares and keep leftmost ones — new squares will be generated on next 'Ouvrir'
          try{ trimTrackAfterAnimation(r, 4); }catch(e){}
          // remove from active finishers map
          try{ activeAnimationFinishers.delete(r); }catch(e){}
          // mark one animation as finished; when all are done on the 10th open, show ranking
          try{
            if (typeof pendingAnimations !== 'undefined' && pendingAnimations > 0) pendingAnimations = Math.max(0, pendingAnimations - 1);
            if (pendingAnimations === 0){
              try{ if (typeof skipBtn !== 'undefined') skipBtn.classList.remove('show'); }catch(e){}
              restoreChanceAfterEvent();
              restoreActivePopupEvent();
              if (openCount >= 10){
                if (!finalRankingApplied){
                  try{ showACs = true; }catch(e){}
                  try{ openWrap.style.display = 'none'; }catch(e){}
                  try{
                    const sorted = players.slice().sort((a,b)=> (b.totalValue || 0) - (a.totalValue || 0));
                    updatePlayerBarRanking(sorted, true);
                    try{ scheduleApplyACs(sorted); }catch(e){}
                  }catch(e){}
                  try{ showSmallBackBtn(); }catch(e){}
                  finalRankingApplied = true;
                }
              } else {
                if (rankEnabled && !tempRankingShown){
                  try{ const sorted = players.slice().sort((a,b)=> (b.totalValue || 0) - (a.totalValue || 0)); updatePlayerBarRanking(sorted, false); tempRankingShown = true; setTimeout(()=>{ try{ if (openCount < 10 && !rankEnabled){ try{ clearRankingBadges(); }catch(e){} } }catch(e){} tempRankingShown = false; }, 900); }catch(e){}
                }
              }
            }
          }catch(e){}
        }
        try{ activeAnimationFinishers.set(r, finalizeOnce); }catch(e){}

        function step(now){
          if (_done) return;
          const t = Math.min(1, (now - startTime) / duration);
          const ease = t === 1 ? 1 : 1 - Math.pow(2, -10 * t);
          const desiredNoComp = initialTranslate + (finalTranslate - initialTranslate) * ease;
          let desired = desiredNoComp + compensation;

          // apply transform for this frame
          track.style.transform = `translateX(${desired}px)`;

          // recycle leading squares while they're off-screen to maintain a continuous stream
          const parentRect = r.getBoundingClientRect();
          while (track.firstChild){
            const firstRect = track.firstChild.getBoundingClientRect();
            if (firstRect.right < parentRect.left - 2){
              // compensate BEFORE DOM change so visual position stays stable
              compensation += spacing;
              desired += spacing;
              track.style.transform = `translateX(${desired}px)`;
              const first = track.firstChild;
              track.removeChild(first);
              track.appendChild(first);
              // when recycling a node, re-roll its rarity so new chance applies immediately
              try { randomizeSquare(first, track, playerIndex, playerIndex); } catch(e){}
              track._N = track.children.length;
              // continue in case multiple are off-screen
            } else break;
          }

          // compute nearest square index to slightly-left-of-center for the lift
          const centerX = rectW / 2;
          const shift = Math.max(6, Math.round(squareSize * 0.12));
          const centerRelativeToTrack = centerX - shift - desired - startOffset;
          const idx = Math.round((centerRelativeToTrack - squareSize/2) / spacing);
          if (idx !== lastNearest){
            if (lastNearest >= 0 && lastNearest < track.children.length) track.children[lastNearest].classList.remove('lift');
            lastNearest = idx;
            if (idx >= 0 && idx < track.children.length) track.children[idx].classList.add('lift');
          }

          if (t < 1) requestAnimationFrame(step);
          else {
            try{ finalizeOnce(); }catch(e){}
          }
        }
        requestAnimationFrame(step);
      }

      // global opener: increments counter and triggers animations for each rect
      openGlobal.addEventListener('click', ()=>{
        // simulate Numpad + on each open
        increaseChanceProgrammatic();
        ensurePendingChanceEventFromPopup();
        applyPendingChanceEvent();
        // apply any generic popup event (StatTrack / FactoryNew / Battle-scarred) to this open
        applyPendingPopupEvent();
        // speed up animation by 5% (reduce duration)
        animationDuration = Math.max(150, Math.round(animationDuration * 0.95));
        openCount = Math.min(10, openCount + 1);
        statusEl.textContent = `Ouverture ${openCount}/10`;
        // gracefully hide previous LEFT fixed per-rect displays (preserve right-side best-item displays) and start animations for all rects
        const existingWins = Array.from(document.querySelectorAll('.won-outside:not(.won-outside-right)'));
        if (existingWins.length){
          existingWins.forEach(e => { e.classList.remove('show'); e.classList.add('hide'); });
          setTimeout(()=> existingWins.forEach(e => { if (e && e.parentNode) e.parentNode.removeChild(e); }), 320);
        }
        const rects = Array.from(document.querySelectorAll('.player-stack-rect'));
        // track pending animations and wait for all to finish before showing ranking on the 10th open
        pendingAnimations = rects.length;
        // prepare skip UI and state for this opening
        try{ skipRequested = false; finalRankingApplied = false; tempRankingShown = false; if (typeof skipBtn !== 'undefined' && pendingAnimations > 0) skipBtn.classList.add('show'); }catch(e){}
        // show temporary ranking only after animations finish (rank toggle state tracked by `rankEnabled`)
        rects.forEach(r => animateTrackForRect(r));
        // If there were no rects to animate, finalize immediately when this was the 10th open
                    if (pendingAnimations === 0){
                      try{
                        if (openCount >= 10){
                          try{ showACs = true; }catch(e){}
                          try{ openWrap.style.display = 'none'; }catch(e){}
                          try{
                                const sorted = players.slice().sort((a,b)=> (b.totalValue || 0) - (a.totalValue || 0));
                                  updatePlayerBarRanking(sorted, true);
                            try{ scheduleApplyACs(sorted); }catch(e){}
                          }catch(e){}
                          try{ showSmallBackBtn(); }catch(e){}
                        } else {
                          // temporary ranking after this open if slider enabled
                          try{
                            if (rankEnabled){
                              const sorted = players.slice().sort((a,b)=> (b.totalValue || 0) - (a.totalValue || 0));
                                updatePlayerBarRanking(sorted, false);
                                setTimeout(()=>{
                                  // clear temporary ranking visuals if not finalized and user didn't enable the toggle
                                  try{ if (openCount < 10 && !rankEnabled){ try{ clearRankingBadges(); }catch(e){} } }catch(e){}
                                }, 900);
                            }
                          }catch(e){}
                        }
                      }catch(e){}
                    }
      });

      // recompute on resize while overlay present
      const onResize = ()=>{ if (document.getElementById('stacksOverlay')) adjustStacksHeights(); else { window.removeEventListener('resize', onResize); if (openWrap && openWrap.parentNode) openWrap.parentNode.removeChild(openWrap); } };
      
      window.addEventListener('resize', onResize);
    });

    // second button simple feedback
    btn2.addEventListener('click', ()=>{ statusEl.textContent = 'Choix: Prochainement...'; });

  })();
  </script>
  <script>
  (function(){
    const FALLBACK_EVENTS = [
      '1 gold garanti',
      'QUE des golds (All)',
      '1 Rouge garanti',
      'QUE des rouges/roses (All)',
      'QUE des StatTracks (All)',
      'Chance x2 (All)',
      'Chance x3 (All)',
      'Chance x5 (All)',
      'Chance x0.5 (All)',
      'Skin>50$ garanti (All)',
      'Skins<1$ garanti (All)',
      'Factory New garanti (All)',
      'Battle-scarred garanti (All)'
    ];
    const KEY = 'tiny-event-next';
    const btn = document.getElementById('tinyEventBtn');
    const panel = document.getElementById('tinyEventPanel');
    const select = document.getElementById('tinyEventSelect');
    const ok = panel.querySelector('button.confirm');
    const cancel = panel.querySelector('button.cancel');

    function updateSelectOptions(list){
      let placeholder = select.querySelector('option[value=""]');
      if (!placeholder){ placeholder = document.createElement('option'); placeholder.value = ''; placeholder.textContent = '— Choisir —'; select.appendChild(placeholder); }
      // remove all existing non-placeholder options
      Array.from(select.querySelectorAll('option')).forEach(opt => { if (opt.value !== '') opt.remove(); });
      if (!Array.isArray(list) || !list.length) list = FALLBACK_EVENTS;
      list.forEach(ev => { const o = document.createElement('option'); o.value = ev; o.textContent = ev; select.appendChild(o); });
    }

    // initial populate (prefer the full pool if available)
    updateSelectOptions(window.popupEventPoolFull || window.popupEventPool || FALLBACK_EVENTS);

    // update when popup schedule is created — prefer full list when provided
    window.addEventListener('popup-events-ready', e => {
      const events = (e && e.detail && (e.detail.full || e.detail.events)) ? (e.detail.full || e.detail.events) : (window.popupEventPoolFull || window.popupEventPool || FALLBACK_EVENTS);
      updateSelectOptions(events);
    });

    // load saved selection
    const saved = localStorage.getItem(KEY);
    if (saved){ if (!Array.from(select.options).some(o=>o.value===saved)){ const o = document.createElement('option'); o.value = saved; o.textContent = saved; select.appendChild(o); } select.value = saved; btn.title = 'Prochain: ' + saved; }

    function openPanel(){ panel.classList.add('show'); panel.setAttribute('aria-hidden','false'); select.focus(); }
    function closePanel(){ panel.classList.remove('show'); panel.setAttribute('aria-hidden','true'); btn.focus(); }

    btn.addEventListener('click', e => { e.stopPropagation(); if (panel.classList.contains('show')) closePanel(); else openPanel(); });

    ok.addEventListener('click', e => {
      e.preventDefault();
      const val = select.value;
      if (val){ localStorage.setItem(KEY, val); btn.title = 'Prochain: ' + val; window.dispatchEvent(new CustomEvent('tiny-event-chosen', { detail: { event: val } })); }
      else { localStorage.removeItem(KEY); btn.title = 'Choisir le prochain événement'; window.dispatchEvent(new CustomEvent('tiny-event-cleared')); }
      closePanel();
    });

    cancel.addEventListener('click', e => { e.preventDefault(); closePanel(); });

    document.addEventListener('click', e => { if (panel.classList.contains('show') && !panel.contains(e.target) && e.target !== btn) closePanel(); });

    document.addEventListener('keydown', e => {
      if (panel.classList.contains('show')){
        if (e.key === 'Escape'){ e.preventDefault(); closePanel(); }
        if (e.key === 'Enter' && document.activeElement === select){ e.preventDefault(); ok.click(); }
      }
    });

    // helper to expose current selection
    window.getNextEvent = function(){ return localStorage.getItem(KEY) || null; };
    window.addEventListener('tiny-event-cleared', () => {
      localStorage.removeItem(KEY);
      btn.title = 'Choisir le prochain événement';
      if (select) select.value = '';
    });
  })();
  </script>
