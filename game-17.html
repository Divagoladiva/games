<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Aboubapizza</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background: #081028; color: #fff; font-family: Segoe UI, Roboto, Arial, sans-serif; margin: 0; padding: 18px; }
    main { max-width: 980px; margin: 8px auto; text-align: center; }
    h1 { margin: 8px 0 12px; font-size: 2.4rem; }
    #status { min-height: 34px; margin-bottom: 12px; font-weight: 900; font-size: 1.4rem; }
    .player-order { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin: 8px 0; }
    .player-chip { padding: 10px 12px; border-radius: 12px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); font-weight: 800; }
    .game-area { min-height: 360px; display: flex; align-items: center; justify-content: center; }
    .pizza-wrapper { position: relative; width: min(92vw, 420px); height: min(92vw, 420px); max-width: 420px; max-height: 420px; }
    .pizza-base { position: relative; width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at 40% 40%, #ffe87f 0%, #f4c546 45%, #d79b2b 100%); border: 18px solid #7d421e; box-shadow: inset 0 18px 38px rgba(0,0,0,0.18), 0 10px 30px rgba(0,0,0,0.16); overflow: hidden; }
    .pizza-base::after { content: ''; position: absolute; inset: 8%; border-radius: 50%; background: radial-gradient(circle at 50% 40%, rgba(255,255,255,0.18), transparent 55%); pointer-events: none; }
    .pizza-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
    .pizza-slice { cursor: pointer; transition: transform .28s ease, filter .28s ease; }
    .pizza-slice:hover { filter: brightness(1.05); }
    .pizza-slice.selected { transform: scale(1.01); }
    .pizza-slice { fill: url(#pizzaGradient); stroke: rgba(255,255,255,0.15); stroke-width: 0.5; }
    .pizza-timer { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); width: min(92vw, 420px); padding: 10px 14px; background: rgba(7, 12, 28, 0.88); border: 1px solid rgba(255,255,255,0.14); border-radius: 16px; display: flex; flex-direction: column; gap: 8px; align-items: center; z-index: 1000; }
    .timer-bar { width: 100%; height: 14px; border-radius: 12px; background: rgba(255,255,255,0.12); overflow: hidden; border: 1px solid rgba(255,255,255,0.16); }
    .timer-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ffca57, #ff7f1f); transform-origin: left center; }
    .timer-label { color: #e8e8ff; font-weight: 700; font-size: 0.95rem; }
    .slice-pepperoni { position: absolute; width: 28px; height: 28px; background: url('assets/game-17/peperoni.png') no-repeat center / contain; pointer-events: none; transition: transform .25s ease; }
    .slice-pepperoni.animate { transform: scale(1.12); }
    .slice-poop { position: absolute; transform: translate(-50%, -50%); font-size: 1.9rem; pointer-events: none; text-shadow: 0 2px 6px rgba(0,0,0,0.35); }
    .slice-label { position: absolute; width: 34px; height: 34px; border-radius: 999px; border: 2px solid rgba(255,255,255,0.78); background: rgba(14, 22, 41, 0.96); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; cursor: pointer; transition: transform .22s ease, background .22s ease, border-color .22s ease; z-index: 4; }
    .slice-label.selected { background: rgba(36, 114, 204, 0.96); border-color: #a8d8ff; }
    .slice-label.disabled { opacity: 0.36; cursor: not-allowed; }
    .slice-label:hover:not(.selected):not(.disabled) { transform: scale(1.08); border-color: #fff; }
    .status-player { font-weight: 900; }
    .rotation-step-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 5; }
    .step-popup { color: #ffffff; font-size: clamp(2.6rem, 6vw, 4.6rem); font-weight: 900; opacity: 0; transform: scale(0.72); transition: opacity .24s ease, transform .24s ease; text-shadow: 0 6px 18px rgba(0,0,0,0.32); }
    .step-popup.visible { opacity: 1; transform: scale(1.15); }
    .step-popup.action { color: #ffd954; }
    .pizza-slice.dead { fill: rgba(255, 80, 80, 0.88) !important; stroke: rgba(255, 180, 180, 0.95); }
    .slice-label.dead { background: #cc2a2a; border-color: #ffd5d5; color: #fff; }
    .blink { animation: blink 0.38s ease-in-out 5 alternate; }
    .fade-away { animation: fadeOut 0.55s ease forwards; }
    .pizza-ingredient-group.eaten .slice-pepperoni,
    .pizza-ingredient-group.eaten .slice-poop { opacity: 0; }
    .pizza-ingredient-group.eaten .slice-pepperoni { transition: transform 0.44s ease-out, opacity 0.44s ease-out; }
    .pizza-ingredient-group.eaten .slice-poop { transition: transform 0.44s ease-out, opacity 0.44s ease-out; }
    .pizza-wrapper { transition: transform .55s ease, opacity .55s ease; }
    .pizza-wrapper.enter-from-top { transform: translateY(-120%); opacity: 0; }
    .pizza-wrapper.to-center { transform: translateY(0); opacity: 1; }
    .pizza-wrapper.to-bottom { transform: translateY(120%); opacity: 0; }
    .player-score { margin-left: 8px; color: #ffd954; font-weight: 800; }
    .player-bar { width: min(100%, 960px); margin: 0 auto 12px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .player-bar .player-pill { min-width: 180px; flex: 0 1 220px; white-space: nowrap; padding: 10px 14px; display: inline-flex; align-items: center; gap: 8px; }
    .player-bar .player-pill span { display: inline-flex; align-items: center; }
    .player-bar .player-pill .player-score { margin-left: 8px; color: #ffd954; font-weight: 800; }
    .player-bar .player-pill .rank-badge, .player-bar .player-pill .ac-badge { margin-left: auto; font-weight: 900; font-size: 0.85rem; padding: 2px 6px; border-radius: 999px; background: rgba(255,255,255,0.8); color: #000; }
    #endLeaderboard { margin-top: 12px; max-width: 720px; margin-left: auto; margin-right: auto; text-align: left; }
    #endLeaderboard h3 { margin: 0 0 8px 0; }
    #endLeaderboard .rank-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .return-btn { margin-top: 12px; padding: 10px 14px; border-radius: 10px; background: #ff776d; color: #fff; border: none; font-weight: 700; cursor: pointer; }
    @keyframes blink { from { opacity: 1; } to { opacity: 0.18; } }
    @keyframes fadeOut { to { opacity: 0; transform: translateY(-10px); } }
  </style>
</head>
<body>
  <main>
    <h1>Aboubapizza</h1>
    <div id="status">Chargement des joueurs...</div>
    <div id="order" class="player-order"></div>
    <div id="gameContainer" class="game-area"></div>
  </main>
  <script src="game-players.js"></script>
  <script>
    (function(){
      const stored = JSON.parse(localStorage.getItem('mini-Jeux-host-players') || '[]');
      const statusEl = document.getElementById('status');
      const orderEl = document.getElementById('order');
      const gameContainer = document.getElementById('gameContainer');

      if (!stored.length) {
        statusEl.textContent = 'Aucun joueur enregistré.';
        return;
      }

      const players = stored.map((p, index) => ({ id: index, name: p.name, color: p.color || '#8ac6ff', score: 0, alive: true, eliminatedAt: null }));
      let order = shuffle(players.slice());
      let eliminationCounter = 0;
      let currentPlayerTurn = 0;
      let slices = [];
      let selections = [];
      let timerFillEl = null;
      let timerLabelEl = null;
      let timerInterval = null;
      let turnTimeout = null;
      let timerStart = 0;

      function shuffle(array) {
        return array.slice().sort(() => Math.random() - 0.5);
      }

      function randomPepperoniCount() {
        const weights = [
          { count: 1, weight: 0.5 },
          { count: 2, weight: 1 / 3 },
          { count: 3, weight: 1 / 4 },
          { count: 5, weight: 1 / 8 }
        ];
        const total = weights.reduce((sum, item) => sum + item.weight, 0);
        let value = Math.random() * total;
        for (const item of weights) {
          if (value < item.weight) return item.count;
          value -= item.weight;
        }
        return 1;
      }

      function getIngredientPositions(count, startAngle, endAngle) {
        const sliceAngle = endAngle - startAngle;
        const positions = [];
        const baseRadius = 24;
        const minRadius = 16;
        const maxRadius = 32;

        for (let i = 0; i < count; i += 1) {
          const wedgeFraction = (i + 1) / (count + 1);
          const randomOffset = (Math.random() - 0.5) * (sliceAngle * 0.18);
          const angle = startAngle + wedgeFraction * sliceAngle + randomOffset;
          const radius = minRadius + Math.random() * (maxRadius - minRadius);
          positions.push({
            x: 50 + radius * Math.cos(angle * Math.PI / 180),
            y: 50 + radius * Math.sin(angle * Math.PI / 180)
          });
        }

        return positions;
      }

      function buildSlices() {
        const count = order.length;
        const poopIndex = Math.floor(Math.random() * count);
        return Array.from({ length: count }, (_, index) => {
          if (index === poopIndex) return { type: 'poop', count: 0 };
          return { type: 'pepperoni', count: randomPepperoniCount() };
        });
      }


      function renderOrder() {
        orderEl.innerHTML = '';
        order.forEach((p, index) => {
          const chip = document.createElement('div');
          chip.className = 'player-chip';
          chip.dataset.playerIndex = String(index);
          chip.style.borderColor = p.color;
          chip.textContent = p.name;
          orderEl.appendChild(chip);
        });
      }

      function ensureTimerUI() {
        if (timerFillEl && timerLabelEl) return;
        const timerWrapper = document.createElement('div');
        timerWrapper.className = 'pizza-timer';
        timerWrapper.innerHTML = `
          <div class="timer-bar"><div class="timer-fill"></div></div>
          <div class="timer-label"><span class="timer-remaining">10.0s</span></div>
        `;
        document.body.appendChild(timerWrapper);
        timerFillEl = timerWrapper.querySelector('.timer-fill');
        timerLabelEl = timerWrapper.querySelector('.timer-remaining');
      }

      function startRound(enterFromTop = false) {
        selections = Array(order.length).fill(null);
        currentPlayerTurn = 0;
        createPizza(enterFromTop);
        renderOrder();
        updatePlayerScorePills();
        updateStatus();
      }

      function updateStatus() {
        if (currentPlayerTurn >= order.length) {
          setStatus('Tous les choix sont faits.');
          clearTurnTimer();
          return;
        }
        const player = order[currentPlayerTurn];
        statusEl.innerHTML = `<span class="status-player" style="color:${player.color}">${player.name}, choisis ta part !</span>`;
        startTurnTimer();
      }

      function randomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function createPizza(enterFromTop = false) {
        ensureTimerUI();
        slices = buildSlices();
        gameContainer.innerHTML = '';
        const wrapper = document.createElement('div');
        wrapper.className = 'pizza-wrapper';
        if (enterFromTop) {
          wrapper.classList.add('enter-from-top');
        }

        const pizzaContent = document.createElement('div');
        pizzaContent.className = 'pizza-content';
        pizzaContent.style.position = 'absolute';
        pizzaContent.style.inset = '0';
        pizzaContent.style.transformOrigin = 'center';

        const pizzaBase = document.createElement('div');
        pizzaBase.className = 'pizza-base';
        pizzaContent.appendChild(pizzaBase);

        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.classList.add('pizza-svg');
        svg.setAttribute('viewBox', '0 0 100 100');
        svg.setAttribute('aria-hidden', 'true');

        const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
        const grad = document.createElementNS('http://www.w3.org/2000/svg', 'radialGradient');
        grad.id = 'pizzaGradient';
        grad.setAttribute('cx', '45%');
        grad.setAttribute('cy', '45%');
        grad.setAttribute('r', '60%');
        const stop1 = document.createElementNS('http://www.w3.org/2000/svg', 'stop'); stop1.setAttribute('offset', '0%'); stop1.setAttribute('stop-color', '#fff2b4');
        const stop2 = document.createElementNS('http://www.w3.org/2000/svg', 'stop'); stop2.setAttribute('offset', '40%'); stop2.setAttribute('stop-color', '#f8d05d');
        const stop3 = document.createElementNS('http://www.w3.org/2000/svg', 'stop'); stop3.setAttribute('offset', '100%'); stop3.setAttribute('stop-color', '#d2952b');
        grad.appendChild(stop1);
        grad.appendChild(stop2);
        grad.appendChild(stop3);
        defs.appendChild(grad);
        svg.appendChild(defs);
        pizzaContent.appendChild(svg);

        wrapper.appendChild(pizzaContent);

        const rotationOverlay = document.createElement('div');
        rotationOverlay.className = 'rotation-step-overlay';
        rotationOverlay.innerHTML = '<div class="step-popup"></div>';
        wrapper.appendChild(rotationOverlay);

        gameContainer.appendChild(wrapper);
        if (enterFromTop) {
          requestAnimationFrame(() => {
            wrapper.classList.add('to-center');
          });
        }

        const center = { x: 50, y: 50 };
        const radius = 44;
        const wrapperRect = wrapper.getBoundingClientRect();
        const centerX = wrapperRect.width / 2;
        const centerY = wrapperRect.height / 2;
        const labelRadius = Math.min(centerX, centerY) - 32;

        slices.forEach((slice, index) => {
          const startAngle = (360 / slices.length) * index - 90;
          const endAngle = (360 / slices.length) * (index + 1) - 90;
          const x1 = center.x + radius * Math.cos(startAngle * Math.PI / 180);
          const y1 = center.y + radius * Math.sin(startAngle * Math.PI / 180);
          const x2 = center.x + radius * Math.cos(endAngle * Math.PI / 180);
          const y2 = center.y + radius * Math.sin(endAngle * Math.PI / 180);
          const largeArc = Math.abs(endAngle - startAngle) > 180 ? 1 : 0;
          const pathData = `M ${center.x} ${center.y} L ${x1} ${y1} A ${radius} ${radius} 0 ${largeArc} 1 ${x2} ${y2} Z`;

          const sliceEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          sliceEl.classList.add('pizza-slice');
          sliceEl.setAttribute('d', pathData);
          sliceEl.setAttribute('data-index', index);
          sliceEl.addEventListener('click', () => chooseSlice(index));
          svg.appendChild(sliceEl);

          const sliceGroup = document.createElement('div');
          sliceGroup.className = 'pizza-ingredient-group';
          sliceGroup.dataset.index = index;
          sliceGroup.style.position = 'absolute';
          sliceGroup.style.left = '0';
          sliceGroup.style.top = '0';
          sliceGroup.style.width = '100%';
          sliceGroup.style.height = '100%';
          sliceGroup.style.pointerEvents = 'none';
          sliceGroup.style.zIndex = '2';
          pizzaContent.appendChild(sliceGroup);

          const midAngle = (startAngle + endAngle) / 2;
          const midRad = midAngle * Math.PI / 180;
          const ingredientRadius = radius * 0.45;
          const ingredientCenter = {
            x: center.x + ingredientRadius * Math.cos(midRad),
            y: center.y + ingredientRadius * Math.sin(midRad)
          };

          if (slice.type === 'poop') {
            const poop = document.createElement('div');
            poop.className = 'slice-poop';
            poop.textContent = '💩';
            poop.style.left = `${ingredientCenter.x}%`;
            poop.style.top = `${ingredientCenter.y}%`;
            sliceGroup.appendChild(poop);
          } else {
            const positions = getIngredientPositions(slice.count, startAngle, endAngle);
            positions.forEach(pos => {
              const pepperoni = document.createElement('div');
              pepperoni.className = 'slice-pepperoni';
              pepperoni.style.left = `${pos.x}%`;
              pepperoni.style.top = `${pos.y}%`;
              if (slice.count === 5) {
                pepperoni.style.background = "url('assets/game-17/peperoni_or.png') no-repeat center / contain";
              }
              sliceGroup.appendChild(pepperoni);
            });
          }

          const label = document.createElement('button');
          label.type = 'button';
          label.className = 'slice-label';
          label.dataset.index = index;
          label.textContent = String(index + 1);
          label.addEventListener('click', () => chooseSlice(index));

          const rad = midAngle * Math.PI / 180;
          const x = centerX + Math.cos(rad) * labelRadius;
          const y = centerY + Math.sin(rad) * labelRadius;
          label.style.left = `${x}px`;
          label.style.top = `${y}px`;
          label.style.transform = 'translate(-50%, -50%)';

          wrapper.appendChild(label);
        });
      }

      function clearTurnTimer() {
        if (turnTimeout) {
          clearTimeout(turnTimeout);
          turnTimeout = null;
        }
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }
        if (timerFillEl) {
          timerFillEl.style.transition = 'none';
          timerFillEl.style.width = '100%';
        }
      }

      function setStatus(message, state = 'normal') {
        const colors = { danger: '#ff6b6b', success: '#7fffb8', normal: '#ffffff' };
        const color = colors[state] || colors.normal;
        statusEl.innerHTML = `<span class="status-player" style="color:${color}">${message}</span>`;
      }

      function showStepPopup(text, type = 'step', duration = 700) {
        const overlay = document.querySelector('.rotation-step-overlay');
        const popup = overlay?.querySelector('.step-popup');
        if (!popup) return;
        popup.textContent = text;
        popup.className = `step-popup visible${type === 'action' ? ' action' : ''}`;
        clearTimeout(popup._hideTimer);
        popup._hideTimer = setTimeout(() => popup.classList.remove('visible'), duration);
      }

      function ensurePlayerBarIds() {
        const bar = document.querySelector('.player-bar');
        if (!bar) return;
        const pills = bar.querySelectorAll('.player-pill');
        pills.forEach((pill, index) => {
          const player = players[index];
          if (!player) return;
          pill.dataset.playerId = String(player.id);
          if (!pill.querySelector('.player-score')) {
            const scoreSpan = document.createElement('span');
            scoreSpan.className = 'player-score';
            pill.appendChild(scoreSpan);
          }
        });
      }

      function updatePlayerScorePills() {
        ensurePlayerBarIds();
        order.forEach(player => {
          const footerPill = document.querySelector(`.player-pill[data-player-id='${player.id}']`);
          if (!footerPill) return;
          const scoreSpan = footerPill.querySelector('.player-score');
          if (scoreSpan) {
            scoreSpan.textContent = player.score > 0 ? `+${player.score}` : '';
          }
        });
      }

      function marioPourtyEnabled() {
        return localStorage.getItem('marioPourty') === 'true';
      }

      function getMarioPourtyBonus(rank, total) {
        let bonuses = [];
        if (total >= 2 && total <= 4) bonuses = [10, 5, 3, 0];
        else if (total === 5) bonuses = [10, 6, 3, 1, 0];
        else if (total === 6) bonuses = [11, 8, 5, 2, 1, 0];
        const value = bonuses[rank - 1] ?? 0;
        return `${value >= 0 ? '+' : ''}${value}ac`;
      }

      function setACText(pill, rank, total) {
        let acBadge = pill.querySelector('.ac-badge');
        if (!acBadge) {
          acBadge = document.createElement('span');
          acBadge.className = 'ac-badge';
          pill.appendChild(acBadge);
        }
        if (marioPourtyEnabled()) {
          acBadge.textContent = getMarioPourtyBonus(rank, total);
          acBadge.style.display = 'inline-flex';
        } else {
          acBadge.style.display = 'none';
        }
      }

      function updatePlayerBarRanking(sorted) {
        const bar = document.querySelector('.player-bar');
        if (!bar) return;
        const pills = Array.from(bar.querySelectorAll('.player-pill'));
        pills.forEach(pill => {
          const name = pill.querySelector('span:nth-child(2)')?.textContent?.trim();
          const res = sorted.find(r => r.name === name);
          let badge = pill.querySelector('.rank-badge');
          if (!badge) {
            badge = document.createElement('span');
            badge.className = 'rank-badge';
            pill.appendChild(badge);
          }
          if (!res) {
            badge.textContent = '';
            pill.style.boxShadow = 'none';
            pill.style.border = '1px solid rgba(255,255,255,0.08)';
            pill.style.background = 'rgba(15,24,46,0.95)';
          } else {
            const rank = sorted.findIndex(r => r.name === name) + 1;
            const rankColor = rank === 1 ? '#ffd700' : rank === 2 ? '#c0c0c0' : rank === 3 ? '#cd7f32' : '#8a2be2';
            badge.textContent = `#${rank}`;
            pill.style.border = `1px solid ${rankColor}`;
            pill.style.boxShadow = `0 0 0 2px ${rankColor}`;
            pill.style.background = 'rgba(255,255,255,0.13)';
            setACText(pill, rank, sorted.length);
          }
        });
      }

      function computeRanking() {
        return players.slice().sort((a, b) => {
          if (b.score !== a.score) return b.score - a.score;
          if (a.alive !== b.alive) return a.alive ? -1 : 1;
          if (!a.alive && !b.alive) return (b.eliminatedAt || 0) - (a.eliminatedAt || 0);
          return 0;
        });
      }

      function endGame() {
        const ranking = computeRanking();
        gameContainer.style.display = 'none';
        orderEl.style.display = 'none';
        const timerWrapper = document.querySelector('.pizza-timer');
        if (timerWrapper) timerWrapper.style.display = 'none';

        const board = document.createElement('div');
        board.id = 'endLeaderboard';
        const title = document.createElement('h3');
        title.textContent = 'CLASSEMENT';
        board.appendChild(title);

        ranking.forEach((player, index) => {
          const row = document.createElement('div');
          row.className = 'rank-row';
          const suffix = (!player.alive && order.length === 1 && player.eliminatedAt === null) ? '' : '';
          row.innerHTML = `<div>#${index + 1} ${player.name}${suffix}</div><div style="font-weight:900">${player.score} pts</div>`;
          board.appendChild(row);
        });

        const ret = document.createElement('button');
        ret.className = 'return-btn';
        ret.textContent = 'Retour';
        ret.addEventListener('click', () => window.location.href = 'index.html');
        board.appendChild(ret);

        statusEl.parentNode.insertBefore(board, statusEl.nextSibling);
        setTimeout(() => updatePlayerBarRanking(ranking), 120);
      }

      window.addEventListener('load', () => {
        ensurePlayerBarIds();
        updatePlayerScorePills();
      });

      function slidePizzaOutAndReplace() {
        const currentWrapper = gameContainer.querySelector('.pizza-wrapper');
        if (!currentWrapper) {
          startRound(true);
          return;
        }
        currentWrapper.classList.add('to-bottom');
        currentWrapper.addEventListener('transitionend', () => {
          gameContainer.innerHTML = '';
          startRound(true);
        }, { once: true });
      }

      function startTurnTimer() {
        clearTurnTimer();
        if (!timerFillEl || !timerLabelEl) return;
        timerStart = Date.now();
        timerFillEl.style.transition = 'none';
        timerFillEl.style.width = '100%';
        requestAnimationFrame(() => {
          timerFillEl.style.transition = 'width 10s linear';
          timerFillEl.style.width = '0%';
        });
        timerLabelEl.textContent = '10.0s';
        timerInterval = setInterval(() => {
          const elapsed = (Date.now() - timerStart) / 1000;
          const remaining = Math.max(0, 10 - elapsed);
          timerLabelEl.textContent = `${remaining.toFixed(1)}s`;
        }, 50);
        turnTimeout = setTimeout(() => {
          timerLabelEl.textContent = '0.0s';
          autoChooseSlice();
        }, 10000);
      }

      function autoChooseSlice() {
        const available = selections.map((item, idx) => item === null ? idx : null).filter(idx => idx !== null);
        if (!available.length) return;
        const randomIndex = available[Math.floor(Math.random() * available.length)];
        chooseSlice(randomIndex);
      }

      function chooseSlice(index) {
        if (selections[index] !== null || currentPlayerTurn >= order.length) return;
        const player = order[currentPlayerTurn];
        selections[index] = player.id;
        const label = document.querySelector(`.slice-label[data-index='${index}']`);
        const sliceEl = document.querySelector(`.pizza-slice[data-index='${index}']`);
        if (label) {
          label.classList.add('selected');
          label.textContent = String(index + 1);
          label.style.background = player.color;
          label.style.borderColor = '#ffffff';
          label.disabled = true;
        }
        if (sliceEl) {
          sliceEl.classList.add('selected');
        }

        currentPlayerTurn += 1;
        if (currentPlayerTurn < order.length) {
          updateStatus();
        } else {
          clearTurnTimer();
          statusEl.textContent = 'La pizza tourne...';
          startRotationAnimation();
        }
      }

      function startRotationAnimation() {
        const rotationSteps = randomInt(1, Math.max(1, order.length * 2));
        const sliceAngle = 360 / order.length;
        const pizzaContent = document.querySelector('.pizza-content');
        if (!pizzaContent) return;
        pizzaContent.style.transition = 'none';
        pizzaContent.style.transform = 'rotate(0deg)';

        let currentStep = 0;
        function animateNextStep() {
          currentStep += 1;
          const duration = Math.max(180, 560 - currentStep * 70);
          showStepPopup(String(currentStep), 'step');
          pizzaContent.style.transition = `transform ${duration}ms cubic-bezier(.2,.65,.25,1)`;
          requestAnimationFrame(() => {
            pizzaContent.style.transform = `rotate(${currentStep * sliceAngle}deg)`;
          });

          const afterStep = () => {
            if (currentStep < rotationSteps) {
              const surprise = Math.random() < 0.1;
              const pause = surprise ? 2000 : Math.max(90, 320 - currentStep * 40);
              if (surprise) {
                console.log('pause surprise: temporaire arrêt entre les pas');
              }
              setTimeout(animateNextStep, pause);
            } else {
              setTimeout(() => {
                showStepPopup('MANGEZ!', 'action');
                setTimeout(() => finalizeRotation(rotationSteps), 520);
              }, 260);
            }
          };

          setTimeout(afterStep, duration + 120);
        }

        animateNextStep();
      }

      function finalizeRotation(rotationSteps) {
        const poopIndex = slices.findIndex(slice => slice.type === 'poop');
        const chooserId = selections[poopIndex];
        const chooserIndex = order.findIndex(player => player.id === chooserId);
        const poopChooser = order[chooserIndex] || { name: 'inconnu' };
        const finalSliceIndex = (poopIndex + rotationSteps) % order.length;
        const eliminatedPlayerId = selections[finalSliceIndex];
        const eliminatedIndex = order.findIndex(player => player.id === eliminatedPlayerId);
        const eliminatedPlayer = order.find(player => player.id === eliminatedPlayerId) || { name: 'inconnu' };
        const deadSlice = document.querySelector(`.pizza-slice[data-index='${poopIndex}']`);
        const deadLabel = document.querySelector(`.slice-label[data-index='${finalSliceIndex}']`);
        const playerChip = eliminatedIndex !== -1
          ? document.querySelector(`.player-chip[data-player-index='${eliminatedIndex}']`)
          : null;
        const eatenGroup = document.querySelector(`.pizza-ingredient-group[data-index='${poopIndex}']`);

        if (chooserIndex === -1) {
          console.warn('bug: impossible de trouver l’index du joueur qui a choisi le caca', { chooserId, selections, order });
        }
        if (eliminatedIndex === -1) {
          console.warn('bug: impossible de trouver le joueur éliminé pour la part rouge', { finalSliceIndex, eliminatedPlayerId, selections, order });
        }
        console.log(`choisi caca: ${poopChooser.name}, caca final sur part ${finalSliceIndex + 1}, éliminé: ${eliminatedPlayer.name}`, { poopIndex, chooserId, chooserIndex, rotationSteps, finalSliceIndex, eliminatedIndex, selections, order: order.map(p => p.name) });

        if (deadSlice) deadSlice.classList.add('dead');
        if (deadLabel) {
          deadLabel.classList.add('dead', 'blink');
        }
        if (playerChip) {
          playerChip.classList.add('blink');
        }
        if (eatenGroup) {
          eatenGroup.classList.add('eaten');
          eatenGroup.querySelectorAll('.slice-pepperoni, .slice-poop').forEach(el => {
            const angle = Math.random() * Math.PI * 2;
            const distance = 32 + Math.random() * 24;
            el.style.transform = `translate(${Math.cos(angle) * distance}px, ${Math.sin(angle) * distance}px) scale(0.34)`;
            el.style.opacity = '0';
          });
        }

        function getReceivedIndex(selectedIndex, rotationSteps, length, reverse) {
          if (reverse) {
            return (selectedIndex + rotationSteps) % length;
          }
          return ((selectedIndex - rotationSteps) % length + length) % length;
        }

        function computeScoreChanges(reverseDirection) {
          const length = order.length;
          const changes = new Map();
          let invalid = false;

          order.forEach(player => {
            if (player.id === eliminatedPlayerId) {
              changes.set(player.id, 0);
              return;
            }
            const selectedIndex = selections.findIndex(selectedId => selectedId === player.id);
            if (selectedIndex === -1) {
              console.warn('ne trouve pas le choix du joueur pour les points', player, selections);
              invalid = true;
              changes.set(player.id, 0);
              return;
            }
            const receivedIndex = getReceivedIndex(selectedIndex, rotationSteps, length, reverseDirection);
            const receivedSlice = slices[receivedIndex];
            if (!receivedSlice) {
              console.warn('part reçue introuvable pour le joueur', player, { selectedIndex, receivedIndex, rotationSteps, slices });
              invalid = true;
              changes.set(player.id, 0);
              return;
            }
            if (player.id === eliminatedPlayerId && receivedSlice.type === 'pepperoni') {
              console.warn('erreur logique : le joueur éliminé recevrait des points', player, { receivedSlice, receivedIndex });
              invalid = true;
            }
            changes.set(player.id, receivedSlice.type === 'pepperoni' ? receivedSlice.count : 0);
          });
          return { changes, invalid };
        }

        const primary = computeScoreChanges(false);
        let apply = primary;
        if (primary.invalid) {
          console.warn('premier calcul des points incorrect, tentative de recalcul avec direction inverse');
          const fallback = computeScoreChanges(true);
          if (!fallback.invalid) {
            apply = fallback;
          } else {
            console.warn('le recalcul inverse n’a pas résolu le problème, application du premier résultat malgré tout');
          }
        }

        apply.changes.forEach((points, playerId) => {
          if (points > 0) {
            const player = order.find(p => p.id === playerId);
            if (player) player.score += points;
          }
        });
        updatePlayerScorePills();

        setStatus(`${eliminatedPlayer.name} a reçu la part piégée !`, 'danger');

        setTimeout(() => {
          if (deadLabel) {
            deadLabel.classList.remove('blink');
            deadLabel.classList.add('fade-away');
          }
          if (playerChip) {
            playerChip.classList.remove('blink');
            playerChip.classList.add('fade-away');
          }
        }, 1200);

        if (eliminatedPlayer && eliminatedPlayer.id !== undefined) {
          eliminatedPlayer.alive = false;
          eliminatedPlayer.eliminatedAt = ++eliminationCounter;
        }

        setTimeout(() => {
          if (deadLabel) deadLabel.remove();
          if (playerChip) playerChip.remove();
          order.splice(eliminatedIndex, 1);
          if (order.length === 1) {
            setStatus(`${order[0].name} a gagné !`, 'success');
            clearTurnTimer();
            endGame();
            return;
          }
          const restartDelay = randomInt(2200, 3800);
          setTimeout(slidePizzaOutAndReplace, restartDelay);
        }, 1800);
      }

      function announceOrder() {
        let step = 0;
        const preview = setInterval(() => {
          const randomName = stored[Math.floor(Math.random() * stored.length)].name;
          statusEl.textContent = 'Ordre aléatoire... ' + randomName;
          step += 1;
          if (step > 18) {
            clearInterval(preview);
            statusEl.textContent = 'Ordre des joueurs';
            renderOrder();
            startRound();
          }
        }, 80);
      }

      announceOrder();
    })();
  </script>
