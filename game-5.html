<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calcul FF mental</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body{background:#0a0f24;min-height:100vh;color:#fff;font-family:Segoe UI,Roboto,Ubuntu,sans-serif;margin:0;padding:0;}
    main{width:100%;max-width:920px;margin:30px auto 90px;padding:20px;text-align:center;}
    h1{font-size:2.2rem;margin-bottom:12px;color:#f4f8ff;}
    #player-name{font-size:1.8rem;font-weight:900;margin:10px 0;color:#fff;}
    #question{font-size:2rem;margin:14px 0;color:#ffd76d;}
    #status{font-size:1.2rem;min-height:34px;margin:8px 0;}
    #timer{font-size:1.2rem;font-weight:800;color:#a3e0ff;margin:4px 0;}
    #slider-container{width:90%;max-width:580px;height:14px;background:rgba(255,255,255,0.16);border-radius:10px;margin:12px auto;overflow:hidden;}
    #slider-bar{height:100%;background:#73d5ff;width:100%;transition:width 0.3s linear;}
    .player-order{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:14px 0;}
    .player-chip{padding:8px 10px;border-radius:12px;background:rgba(255,255,255,0.11);border:1px solid rgba(255,255,255,0.25);font-weight:700;}
    .player-chip.active{box-shadow:0 0 0 2px rgba(255,220,90,0.35);border-color:#ffd76d;}
    #answers{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin:18px auto;max-width:520px;}
    .answer-btn{padding:16px;font-size:1.2rem;font-weight:800;border-radius:10px;border:none;color:#fff;background:rgba(26,80,160,0.9);cursor:pointer;transition:transform .15s ease,background .2s ease;}
    .answer-btn:hover{transform:scale(1.03);}
    .answer-btn.disabled{opacity:0.45;cursor:not-allowed;}
    #eliminate-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,0,0,0.74);z-index:999;align-items:center;justify-content:center;color:#fff;font-size:3rem;font-weight:900;text-shadow:0 0 12px #000;}
    #final-state{display:none;margin-top:20px;font-size:1.1rem;color:#dbe9ff;}
    #return-btn{display:none;position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);padding:12px 20px;font-size:1.2rem;font-weight:900;border:none;border-radius:10px;background:#ff776d;color:#fff;cursor:pointer;z-index:1000;}
  </style>
</head>
<body>
  <main>
    <h1>Calcul FF mental</h1>
    <div id="status">Préparation du jeu...</div>
    <div id="order" class="player-order"></div>
    <div id="player-name"></div>
    <div id="timer"></div>
    <div id="question"></div>
    <div id="slider-container"><div id="slider-bar"></div></div>
    <div id="answers"></div>
    <div id="final-state"></div>
  </main>
  <div id="eliminate-overlay">ÉLIMINÉ</div>
  <button id="return-btn">Retour au menu</button>
  <script src="game-players.js"></script>
  <script>
(function(){
  const savedPlayers = JSON.parse(localStorage.getItem('mini-Jeux-host-players') || '[]');
  const statusEl = document.getElementById('status');
  const playerNameEl = document.getElementById('player-name');
  const timerEl = document.getElementById('timer');
  const questionEl = document.getElementById('question');
  const sliderBar = document.getElementById('slider-bar');
  const answersEl = document.getElementById('answers');
  const eliminateOverlay = document.getElementById('eliminate-overlay');
  const finalEl = document.getElementById('final-state');
  const returnBtn = document.getElementById('return-btn');

  if (savedPlayers.length < 2) {
    statusEl.textContent = 'Il faut au moins 2 joueurs (2 à 6).';
    return;
  }

  const players = savedPlayers.slice(0,6).map((p, idx) => ({
    name: p.name,
    color: p.color || '#fff',
    eliminated: false,
    eliminationRank: null,
    id: idx
  }));

  let activePlayers = shuffle(players.filter(p => !p.eliminated));
  let eliminatedPlayers = [];
  let currentIdx = 0;
  let round = 1;
  let timeLimit = 10;
  let timeLeft = timeLimit;
  let timerId = null;
  let answerOptions = [];
  let currentAnswer = null;
  let turnoverCount = 0;

  function shuffle(arr) {
    return arr.slice().sort(() => Math.random() - 0.5);
  }

  function setStatus(text, color) {
    statusEl.textContent = text;
    statusEl.style.color = color || '#e0f4ff';
  }

  function setQuestion(text) {
    questionEl.textContent = text;
  }

  function setTimerDisplay(sec) {
    timerEl.textContent = `Temps : ${sec}s`;  
    sliderBar.style.width = `${(sec/timeLimit)*100}%`;
  }

  function clearTimer() {
    if (timerId) {
      clearInterval(timerId);
      timerId = null;
    }
  }

  function renderOrder(active = activePlayers) {
    const orderEl = document.getElementById('order');
    if (!orderEl) return;
    orderEl.innerHTML = '';
    if (!Array.isArray(active)) return;
    active.forEach((p, idx) => {
      const chip = document.createElement('div');
      chip.className = 'player-chip' + (idx === currentIdx ? ' active' : '');
      chip.style.borderColor = p.color || '#fff';
      chip.textContent = p.name;
      orderEl.appendChild(chip);
    });
  }


  function generateQuestion() {
    const difficulty = round;
    let a,b,problem,answer;
    if (difficulty === 1) {
      if (Math.random() < 0.5) {
        a = Math.floor(Math.random()*20)+1;
        b = Math.floor(Math.random()*20)+1;
        answer = a + b;
        problem = `${a} + ${b}`;
      } else {
        a = Math.floor(Math.random()*40)+1;
        b = Math.floor(Math.random()*20)+1;
        answer = a - b;
        problem = `${a} - ${b}`;
      }
    } else if (difficulty === 2) {
      a = Math.floor(Math.random()*12)+2;
      b = Math.floor(Math.random()*12)+2;
      answer = a * b;
      problem = `${a} × ${b}`;
    } else if (difficulty === 3) {
      b = Math.floor(Math.random()*11)+2;
      answer = Math.floor(Math.random()*12)+2;
      a = b*answer;
      problem = `${a} ÷ ${b}`;
    } else {
      if (Math.random() < 0.5) {
        a = Math.floor(Math.random()*12)+2;
        b = Math.floor(Math.random()*12)+2;
        answer = a * b;
        problem = `${a} × ${b}`;
      } else {
        b = Math.floor(Math.random()*11)+2;
        answer = Math.floor(Math.random()*12)+2;
        a = b*answer;
        problem = `${a} ÷ ${b}`;
      }
    }

    const variants = new Set([answer]);
    while (variants.size < 4) {
      const delta = Math.floor(Math.random()*7)-3;
      let wrong = answer + delta;
      if (wrong === answer) wrong += 2;
      variants.add(wrong);
    }
    answerOptions = shuffle(Array.from(variants));
    currentAnswer = answer;
    setQuestion(problem);
    renderAnswers();
  }

  function renderAnswers() {
    answersEl.innerHTML = '';
    const labels = ['A','B','C','D'];
    answerOptions.forEach((val, idx) => {
      const btn = document.createElement('button');
      btn.className = 'answer-btn';
      btn.textContent = `${labels[idx]} : ${val}`;
      btn.addEventListener('click', () => chooseAnswer(val));
      answersEl.appendChild(btn);
    });
  }

  function startTimer() {
    clearTimer();
    timeLeft = timeLimit;
    setTimerDisplay(timeLeft);
    timerId = setInterval(() => {
      timeLeft -= 1;
      setTimerDisplay(timeLeft);
      if (timeLeft <= 0) {
        clearTimer();
        eliminateCurrent('Temps écoulé');
      }
    }, 1000);
  }

  function chooseAnswer(value) {
    if (activePlayers.length===0) return;
    clearTimer();
    if (value === currentAnswer) {
      setStatus(`${currentPlayer().name} a juste !`, currentPlayer().color);
      nextTurn(true);
    } else {
      eliminateCurrent('Mauvaise réponse');
    }
  }

  function currentPlayer() {
    return activePlayers[currentIdx];
  }

  function eliminateCurrent(reason) {
    const player = currentPlayer();
    player.eliminated = true;
    player.eliminationRank = eliminatedPlayers.length + 1;
    eliminatedPlayers.push(player);
    setStatus(`${player.name} ${reason} et est éliminé.`, '#ff4c4c');

    showEliminateOverlay();
    activePlayers.splice(currentIdx,1);
    if (currentIdx >= activePlayers.length) currentIdx = 0;

    if (activePlayers.length <= 1) {
      setTimeout(() => {
        hideEliminateOverlay();
        endGame();
      }, 1000);
      return;
    }
    setTimeout(() => {
      hideEliminateOverlay();
      nextTurn(false);
    }, 1200);
  }

  function showEliminateOverlay() {
    eliminateOverlay.style.display = 'flex';
  }

  function hideEliminateOverlay() {
    eliminateOverlay.style.display = 'none';
  }

  function nextTurn(success) {
    if (success) {
      currentIdx +=1;
      if (currentIdx >= activePlayers.length) {
        currentIdx = 0;
        round +=1;
        timeLimit = Math.max(4, 10 - (round -1));
      }
    }

    turnoverCount +=1;
    if (turnoverCount >= activePlayers.length) {
      turnoverCount = 0;
      round = Math.min(round + 1, 4);
      timeLimit = Math.max(4, 10 - (round -1));
    }

    if (activePlayers.length <=1) {
      endGame();
      return;
    }

    renderOrder(activePlayers);
    renderQuestionCycle();
  }

  function renderQuestionCycle() {
    const p = currentPlayer();
    playerNameEl.textContent = p.name;
    playerNameEl.style.color = p.color;
    setStatus(`C’est au tour de ${p.name} (round ${round}).`, p.color);
    generateQuestion();
    startTimer();
  }

  function endGame() {
    clearTimer();
    hideEliminateOverlay();
    answersEl.innerHTML = '';
    questionEl.textContent = '';
    playerNameEl.textContent = '';
    timerEl.textContent = '';
    setStatus('Jeu terminé !', '#ffe68d');

    const ranking = [];
    // le dernier survivant (s’il existe) est 1er
    if (activePlayers.length === 1) {
      ranking.push(activePlayers[0]);
    }
    // les éliminés doivent être inversés : dernier éliminé monte plus haut
    ranking.push(...eliminatedPlayers.slice().reverse());

    // hide game UI
    playerNameEl.style.display='none';
    questionEl.style.display='none';
    sliderBar.parentElement.style.display='none';
    answersEl.style.display='none';
    statusEl.style.display='none';

    finalEl.style.display='block';
    finalEl.innerHTML='<h2>Classement final</h2>';

    updatePlayerBarRanking(ranking);

    returnBtn.style.display='block';
  }

  function updatePlayerBarRanking(sorted) {
    const bar = document.querySelector('.player-bar');
    if (!bar) return;
    const pills = Array.from(bar.querySelectorAll('.player-pill'));
    pills.forEach(pill => {
      const name = pill.querySelector('span:nth-child(2)')?.textContent?.trim();
      const res = sorted.find(r => r.name === name);
      let badge = pill.querySelector('.rank-badge');
      if (!badge) {
        badge = document.createElement('span');
        badge.className = 'rank-badge';
        badge.style.marginLeft = 'auto';
        badge.style.fontWeight = '900';
        badge.style.fontSize = '0.85rem';
        badge.style.padding = '2px 6px';
        badge.style.borderRadius = '99px';
        badge.style.background = 'rgba(255,255,255,0.8)';
        badge.style.color = '#000';
        pill.appendChild(badge);
      }
      if (!res) {
        badge.textContent = '';
        pill.style.boxShadow = 'none';
        pill.style.border = '1px solid rgba(255,255,255,0.28)';
        pill.style.background = 'rgba(15,24,46,0.95)';
      } else {
        const rank = sorted.findIndex(r => r.name === name) + 1;
        const rankColor = rank === 1 ? '#ffd700' : rank === 2 ? '#c0c0c0' : rank === 3 ? '#cd7f32' : '#8a2be2';
        badge.textContent = `#${rank}`;
        pill.style.border = `1px solid ${rankColor}`;
        pill.style.boxShadow = `0 0 0 2px ${rankColor}`;
        pill.style.background = 'rgba(255,255,255,0.13)';
        setACText(pill, rank, sorted.length);
      }
    });
  }

  function announceOrder(callback) {
    let step = 0;
    const preview = setInterval(() => {
      const randomName = activePlayers[Math.floor(Math.random() * activePlayers.length)].name;
      setStatus(`Ordre aléatoire ... ${randomName}`);
      step += 1;
      if (step >= 20) {
        clearInterval(preview);
        activePlayers = shuffle(activePlayers);
        setStatus(`Ordre fixé : ${activePlayers.map(p=>p.name).join(' → ')}`);
        renderOrder();
        setTimeout(callback, 800);
      }
    }, 80);
  }

  returnBtn.addEventListener('click', () => { window.location.href = 'index.html'; });

  setStatus('Animation de l’ordre des joueurs...');
  announceOrder(renderQuestionCycle);
})();
  </script>
</body>
</html>
